<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Gold 8 VIP</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --tg-blue: #24A1DE; 
            --viber-purple: #7360f2; 
        }
        
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }

        /* 外部容器 */
        .card { 
            position: relative; 
            width: 85%; 
            max-width: 380px; 
            padding: 5px; 
            border-radius: 32px; 
            overflow: hidden; /* 剪裁溢出的金币 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 旋转金币层 - 增加数量和动画 */
        .card::before, .card::after {
            /* 增加金币密度 */
            content: "🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙"; 
            position: absolute; 
            width: 180%; 
            height: 180%;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            z-index: 0;
        }

        /* 第一层顺时针旋转 */
        .card::before {
            animation: rotateCoins 10s linear infinite;
            filter: drop-shadow(0 0 8px var(--gold));
        }

        /* 第二层逆时针旋转，增加层次感 */
        .card::after {
            content: "🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙 🪙";
            animation: rotateCoins 15s linear reverse infinite;
            opacity: 0.5;
        }

        @keyframes rotateCoins { 
            from { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); } /* 增加缩放呼吸感 */
            to { transform: rotate(360deg) scale(1); } 
        }

        /* 内部透明卡片 */
        .card-inner { 
            position: relative;
            width: 100%;
            /* 关键：半透明背景 + 毛玻璃效果 */
            background: rgba(15, 15, 15, 0.75); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-radius: 28px; 
            padding: 35px 20px; 
            z-index: 1;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        /* 其他样式保持一致 */
        .logo-area { position: relative; width: 90px; height: 90px; margin: 0 auto 15px; }
        .logo { 
            width: 100%; height: 100%; border-radius: 22px; overflow: hidden;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); border: 2px solid var(--gold);
        }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        .verified-badge { 
            position: absolute; bottom: -5px; right: -5px; background: #00c853; 
            color: white; font-size: 10px; padding: 3px 7px; border-radius: 8px; border: 2px solid #121212;
        }

        h1 { font-size: 22px; color: var(--gold); margin: 10px 0 5px; text-shadow: 0 2px 4px #000; }
        .status { font-size: 12px; color: #00c853; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 25px; }
        .dot { width: 8px; height: 8px; background: #00c853; border-radius: 50%; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .pay-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 25px; }
        .pay-box { 
            display: flex; align-items: center; background: rgba(255,255,255,0.08); 
            padding: 10px 15px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1);
            text-align: left;
        }
        .pay-icon { width: 30px; height: 30px; border-radius: 6px; margin-right: 12px; }
        .pay-info strong { color: #fff; font-size: 14px; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none; padding: 15px; border-radius: 16px; font-weight: bold; font-size: 16px; transition: 0.3s;
        }
        .btn-tg { background: linear-gradient(90deg, #24A1DE, #1c82b6); color: white; }
        .btn-viber { background: linear-gradient(90deg, var(--viber-purple), #5d4ed1); color: white; }
        .btn:active { transform: scale(0.96); }

        .notice { margin-top: 20px; font-size: 10px; color: #aaa; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-inner">
            <div class="logo-area">
                <div class="logo">
                    <!-- 请替换为您自己的 Logo 图片 -->
                    <img src="Gold-8-profile-logo-and-Banner.png" alt="Logo" onerror="this.style.background='#333'">
                </div>
                <div class="verified-badge">Verified</div>
            </div>
            
            <h1>VIP Gold 8 Service</h1>
            <div class="status"><span class="dot"></span> Online ဝန်ဆောင်မှုရှိနေပါသည်</div>

            <div class="pay-grid">
                <div class="pay-box">
                    <img src="Kpay.png" class="pay-icon" alt="K" onerror="this.style.background='#eee'">
                    <div class="pay-info"><strong>KBZPay</strong></div>
                </div>
                <div class="pay-box">
                    <img src="WavePay.png" class="pay-icon" alt="W" onerror="this.style.background='#eee'">
                    <div class="pay-info"><strong>WavePay</strong></div>
                </div>
            </div>

            <div class="btn-group">
                <a href="https://t.me" class="btn btn-tg">
                    Telegram တွင် ဆက်သွယ်ပါ
                </a>
                <a href="viber://chat?number=%2B95900000000" class="btn btn-viber">
                    Viber တွင် ဆက်သွယ်ပါ
                </a>
            </div>

            <div class="notice">
                မြန်မာနိုင်ငံ၏ စိတ်ချရဆုံးနှင့် အမြန်ဆန်ဆုံး ဝန်ဆောင်မှု<br>
                (၂၄) နာရီ စိတ်ကြိုက်မေးမြန်းနိုင်ပါသည်
            </div>
        </div>
    </div>
</body>
</html>
