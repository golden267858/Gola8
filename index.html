<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Myanmar Gold 8 VIP - Club388® & Batman688® Agent</title>
    <style>
        :root { 
            --gold: #d4af37; --gold-light: #f9edbe; --gold-bright: #fff9e6; --gold-dark: #8a6d3b;
        }
        
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            color: #fff; font-family: 'Pyidaungsu', 'Segoe UI', Roboto, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow: hidden;
        }

        /* 预加载遮罩层样式 */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .loader-spin {
            width: 50px; height: 50px; border: 3px solid rgba(212,175,55,0.2);
            border-top: 3px solid var(--gold); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .fade-out { opacity: 0; transition: opacity 0.6s ease; pointer-events: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 金币雨 */
        .foreground-coins { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; perspective: 1000px; }
        .coin { position: absolute; top: -60px; transform-style: preserve-3d; animation: fall-slow linear forwards; }
        .coin-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; animation: rotate-flat 4s linear infinite; }
        .face { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 35% 35%, var(--gold-bright) 0%, var(--gold) 50%, var(--gold-dark) 100%); border: 1px solid rgba(255, 255, 255, 0.4); display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 6px rgba(0,0,0,0.4); backface-visibility: hidden; }
        .face::after { content: "MMK"; font-size: 10px; font-weight: 900; color: #5c441a; transform: scale(0.7); }
        .side { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: repeating-conic-gradient(from 0deg, var(--gold-dark) 0deg 3deg, var(--gold-bright) 3deg 6deg); transform: translateZ(-1px); }
        .front { transform: translateZ(1px); } .back { transform: translateZ(-1px) rotateY(180deg); }
        @keyframes rotate-flat { 0% { transform: rotateZ(0deg); } 100% { transform: rotateZ(360deg); } }
        @keyframes fall-slow { 0% { transform: translateY(0); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(115vh); opacity: 1; } }

        /* 卡片主体 */
        .card { position: relative; background: rgba(20, 20, 20, 0.95); width: 88%; max-width: 380px; padding: 4px; border-radius: 35px; text-align: center; overflow: hidden; backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.3); z-index: 10; }
        .card::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, transparent, transparent, var(--gold)); animation: rotate-border 4s linear infinite; z-index: -1; }
        @keyframes rotate-border { 100% { transform: rotate(360deg); } }
        .card-inner { background: #121212; border-radius: 32px; padding: 20px 15px; }

        .top-ticker { background: rgba(212, 175, 55, 0.08); border: 1px solid rgba(212, 175, 55, 0.25); border-radius: 50px; margin-bottom: 18px; padding: 5px 0; overflow: hidden; display: flex; }
        .ticker-move { display: inline-block; white-space: nowrap; animation: tickerInfinite 50s linear infinite; color: var(--gold-light); font-size: 11px; font-weight: bold; }
        @keyframes tickerInfinite { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .logo-area { position: relative; width: 100px; height: 100px; margin: 0 auto 10px; animation: breathe 3s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); filter: drop-shadow(0 0 15px var(--gold)); } }
        .logo { width: 100%; height: 100%; border-radius: 22px; overflow: hidden; border: 2px solid var(--gold); background: #1a1a1a; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        .verified-badge { position: absolute; bottom: -5px; right: -5px; background: #00c853; color: white; font-size: 9px; padding: 2px 6px; border-radius: 8px; border: 2px solid #121212; }

        h1 { font-size: 20px; color: var(--gold); margin: 5px 0; }
        .status { font-size: 12px; color: #44eb87; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 15px; }
        .dot { width: 8px; height: 8px; background: #00c853; border-radius: 50%; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .game-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .game-box { width: 75px; height: 75px; background: #000; border-radius: 15px; border: 1px solid rgba(212,175,55,0.4); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .game-box img { width: 90%; height: 90%; object-fit: contain; }

        .pay-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .pay-box { flex: 1; background: rgba(255,255,255,0.03); padding: 8px 5px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.08); font-size: 10px; }
        .pay-icon-wrapper { width: 40px; height: 40px; border-radius: 10px; overflow: hidden; margin: 0 auto 5px; background: #fff; }
        .pay-icon-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn { display: flex; align-items: center; text-decoration: none; padding: 10px 15px; border-radius: 20px; color: white; gap: 12px; transform: scaleY(0.85); animation: golaBreathe 2.5s infinite; border: 1px solid rgba(255,255,255,0.2); }
        .btn > * { transform: scaleY(1.18); }
        .btn img { width: 40px; height: 40px; }
        .btn-tg { background: linear-gradient(90deg, #24A1DE, #1c82b6); }
        .btn-viber { background: linear-gradient(90deg, #7360f2, #5d4ed1); }
        @keyframes golaBreathe { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.2); transform: scaleY(0.88); } }

        .notice { margin-top: 15px; font-size: 10px; color: #666; line-height: 1.4; }
    </style>
</head>
<body>

    <!-- Preloader -->
    <div id="preloader">
        <div class="loader-spin"></div>
        <div style="margin-top:15px; color:#d4af37; font-size:13px;">ခဏစောင့်ပါ...</div>
    </div>

    <div class="foreground-coins" id="coin-canvas"></div>

    <div class="card">
        <div class="card-inner">
            <div class="top-ticker">
                <div class="ticker-move" id="winners-list">Loading...</div>
            </div>

            <div class="logo-area">
                <div class="logo"><img src="logo.png" alt="Logo" onerror="this.style.background='#333'"></div>
                <div class="verified-badge">Verified</div>
            </div>

            <h1>Gold 8 VIP Service</h1>
            <div class="status"><span class="dot"></span>Online - အခုဆက်သွယ်ပါ</div>

            <div class="game-row">
                <div class="game-box"><img src="club388.png" alt="C388"></div>
                <div class="game-box"><img src="batman688.png" alt="B688"></div>
            </div>

            <div class="pay-row">
                <div class="pay-box"><div class="pay-icon-wrapper"><img src="Kpay.png" alt="K"></div>KBZPay</div>
                <div class="pay-box"><div class="pay-icon-wrapper"><img src="WavePay.png" alt="W"></div>WavePay</div>
            </div>

            <div class="btn-group">
                <a href="https://t.me" class="btn btn-tg" target="_blank">
                    <img src="telegram.png" alt="TG">
                    <div style="text-align:left;"><span style="font-weight:bold; font-size:14px;">Telegram ဆက်သွယ်ရန်</span><br><span style="font-size:10px; opacity:0.8;">Customer Service 24/7</span></div>
                </a>
                <a href="https://msng.link" class="btn btn-viber">
                    <img src="viber.png" alt="V">
                    <div style="text-align:left;"><span style="font-weight:bold; font-size:14px;">Viber ဆက်သွယ်ရန်</span><br><span style="font-size:10px; opacity:0.8;">တိုက်ရိုက်ပြောဆိုပါ</span></div>
                </a>
            </div>

            <div class="notice">
                <b>Club388® & Batman688® Official Agent</b><br>Safe & Fast Service in Myanmar
            </div>
        </div>
    </div>

    <script>
        // Preloader 逻辑
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('preloader').classList.add('fade-out');
                setTimeout(() => document.getElementById('preloader').style.display = 'none', 600);
            }, 500);
        });

        // 跑马灯逻辑
        const mimes = ['097', '099', '094', '092', '098'];
        function initTicker() {
            let html = "";
            for(let i=0; i<12; i++){
                let p = mimes[Math.floor(Math.random()*5)] + "****" + Math.floor(Math.random()*999);
                let amt = (Math.floor(Math.random()*50)+5)*10000;
                html += `<span> 💰 [${p}] သည် ${amt.toLocaleString()} MMK အနိုင်ရရှိသွားပါသည်။ &nbsp;&nbsp;&nbsp;&nbsp;</span>`;
            }
            document.getElementById('winners-list').innerHTML = html + html;
        }
        initTicker();

        // 金币雨逻辑
        const canvas = document.getElementById('coin-canvas');
        function spawnCoin(d=0) {
            const c = document.createElement('div');
            c.className = 'coin';
            const s = 25 + Math.random()*15;
            c.style.left = Math.random()*100+'%';
            c.style.width = s+'px'; c.style.height = s+'px';
            c.style.animationDelay = d+'s'; c.style.animationDuration = (5+Math.random()*5)+'s';
            c.innerHTML = `<div class="coin-inner"><div class="face front"></div><div class="face back"></div><div class="side"></div></div>`;
            canvas.appendChild(c);
            c.addEventListener('animationend', () => { c.remove(); spawnCoin(0); });
        }
        for(let i=0; i<10; i++) spawnCoin(Math.random()*5);
    </script>
</body>
</html>
