<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>缅甸本地支付 - 黑金版</title>
    <style>
        /* 核心黑金配色 */
        body {
            background-color: #0d0d0d; /* 深黑背景 */
            color: #d4af37;           /* 黄金色文字 */
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .payment-container {
            text-align: center;
            background: linear-gradient(145deg, #1a1a1a, #000000);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .icon-group {
            display: flex;
            gap: 25px;
            justify-content: center;
            margin-top: 20px;
        }

        /* 图标样式：精致App圆角+阴影 */
        .pay-link {
            transition: transform 0.2s ease;
            text-decoration: none;
        }

        .pay-link:hover {
            transform: scale(1.1); /* 鼠标悬停放大效果 */
        }

        .pay-icon {
            width: 80px;            /* 建议图标尺寸 */
            height: 80px;
            border-radius: 15px;    /* 圆角 */
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2); /* 金色微光阴影 */
            object-fit: cover;
            border: 1px solid #444;
        }

        .label {
            display: block;
            margin-top: 8px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="payment-container">
        <h3>缅甸本地快捷支付</h3>
        <p style="color: #aaa;">请选择支付方式进行跳转</p>

        <div class="icon-group">
            <!-- KBZ Pay 入口 -->
            <a href="https://kbzpay.com" target="_blank" class="pay-link">
                <!-- 请确保文件名与你上传的完全一致 -->
                <img src="kpay.png" alt="Kpay" class="pay-icon">
                <span class="label">Kpay</span>
            </a>

            <!-- Wave Money 入口 -->
            <a href="https://wavemoney.com.mm" target="_blank" class="pay-link">
                <!-- 请确保文件名与你上传的完全一致 -->
                <img src="wave.png" alt="WavePay" class="pay-icon">
                <span class="label">WavePay</span>
            </a>
        </div>
    </div>

</body>
</html>
