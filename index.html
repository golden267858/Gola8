<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Myanmar Gold 8 VIP</title>

<style>

body{
margin:0;
background:radial-gradient(circle,#1a1a1a,#000);
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

/* CARD */

.card{
width:88%;
max-width:380px;
background:#111;
border-radius:30px;
padding:25px;
text-align:center;
border:1px solid rgba(212,175,55,.4);
}

.logo{
width:110px;
height:110px;
margin:auto;
border-radius:18px;
overflow:hidden;
border:2px solid gold;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

h1{
color:#d4af37;
margin:10px 0;
}

.status{
font-size:12px;
color:#44ff88;
margin-bottom:15px;
}

/* GAME */

.games{
display:flex;
justify-content:center;
gap:12px;
margin-bottom:18px;
}

.game{
width:80px;
height:80px;
border-radius:14px;
overflow:hidden;
border:1px solid rgba(212,175,55,.3);
}

.game img{
width:100%;
height:100%;
}

/* PAY */

.pay{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:20px;
}

.paybox{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
color:#ffd700;
}

.paybox img{
width:55px;
height:55px;
background:#fff;
padding:6px;
border-radius:12px;
object-fit:contain;
}

/* BUTTONS */

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
margin:10px auto;
padding:14px;
width:240px;
border-radius:20px;
text-decoration:none;
color:white;
font-weight:bold;
}

.btn img{
width:40px;
height:40px;
object-fit:contain;
}

.tg{
background:#229ED9;
}

.vb{
background:#665CAC;
}

/* COINS */

.coin{
position:fixed;
top:-40px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>
</head>

<body>

<div class="card">

<div class="logo">
<img src="logo.png">
</div>

<h1>Gold 8 VIP Service</h1>

<div class="status">🟢 Online</div>

<!-- GAMES -->
<div class="games">
<div class="game"><img src="club388.png"></div>
<div class="game"><img src="batman688.png"></div>
</div>

<!-- PAY -->
<div class="pay">

<div class="paybox">
<img src="Kpay.png">
<div>KBZPay</div>
</div>

<div class="paybox">
<img src="WavePay.png">
<div>WavePay</div>
</div>

</div>

<!-- BUTTONS -->
<a class="btn tg" href="https://t.me/YOUR_TELEGRAM">
<img src="telegram.png">
Telegram
</a>

<a class="btn vb" href="viber://chat?number=%2B959123456789">
<img src="viber.png">
Viber
</a>

</div>

<script>

/* simple coin */
setInterval(()=>{

let c=document.createElement("div")
c.className="coin"
c.innerHTML="💰"
c.style.left=Math.random()*100+"%"
c.style.animationDuration=(4+Math.random()*4)+"s"

document.body.appendChild(c)

setTimeout(()=>c.remove(),8000)

},400)

</script>

</body>
</html>
