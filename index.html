<!DOCTYPE html>

<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gold 8 VIP Agent</title>

<style>

:root{
--gold:#d4af37;
--gold-light:#fff4c2;
--gold-dark:#8a6d3b;
--tg:#24A1DE;
--viber:#7360f2;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Segoe UI,Arial;
background:radial-gradient(circle at center,#1a1a1a 0%,#000 100%);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
color:white;
overflow:hidden;
}

/* GOLD BORDER */

.card{
position:relative;
width:360px;
border-radius:28px;
padding:3px;
background:linear-gradient(45deg,#d4af37,#fff4c2,#d4af37);
animation:borderRotate 6s linear infinite;
}

@keyframes borderRotate{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(360deg)}
}

.card-inner{
background:#111;
border-radius:25px;
padding:25px;
text-align:center;
}

/* LOGO */

.logo{
width:110px;
height:110px;
margin:auto;
border-radius:20px;
overflow:hidden;
border:2px solid var(--gold);
box-shadow:0 0 20px rgba(212,175,55,.6);
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

/* TITLE */

h1{
margin:15px 0 8px;
font-size:22px;
color:var(--gold-light);
}

.status{
font-size:12px;
color:#5cff95;
margin-bottom:20px;
}

/* GAMES */

.games{
display:flex;
justify-content:center;
gap:14px;
margin-bottom:18px;
}

.game{
width:80px;
height:80px;
background:black;
border-radius:16px;
overflow:hidden;
border:1px solid rgba(212,175,55,.4);
}

.game img{
width:100%;
height:100%;
}

/* PAY */

.pay{
display:flex;
gap:10px;
margin-bottom:20px;
}

.paybox{
flex:1;
background:rgba(255,255,255,.05);
border-radius:14px;
padding:10px;
}

.paybox img{
width:45px;
}

/* BUTTON */

.buttons{
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:12px;
border-radius:20px;
text-decoration:none;
color:white;
font-weight:bold;
transition:.2s;
}

.btn img{
width:28px;
}

.btn:hover{
transform:scale(1.05);
}

.btn-tg{
background:linear-gradient(90deg,#24A1DE,#1c82b6);
box-shadow:0 0 15px rgba(36,161,222,.6);
}

.btn-viber{
background:linear-gradient(90deg,#7360f2,#5d4ed1);
box-shadow:0 0 15px rgba(115,96,242,.6);
}

.notice{
margin-top:20px;
font-size:11px;
color:#999;
}

/* COINS */

.coin{
position:fixed;
top:-40px;
font-size:22px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>

</head>

<body>

<div class="card">
<div class="card-inner">

<div class="logo">
<img src="logo.png">
</div>

<h1>Gold 8 VIP Service</h1>
<div class="status">🟢 Online - အခုဆက်သွယ်နိုင်ပါသည်</div>

<div class="games">

<div class="game">
<img src="club388.png">
</div>

<div class="game">
<img src="batman688.png">
</div>

</div>

<div class="pay">

<div class="paybox">
<img src="kpay.png"><br>
KBZPay
</div>

<div class="paybox">
<img src="wavepay.png"><br>
WavePay
</div>

</div>

<div class="buttons">

<a href="https://t.me/YOUR_TELEGRAM" class="btn btn-tg">
<img src="telegram.png">
Telegram Support
</a>

<a href="viber://chat?number=%2B959123456789" class="btn btn-viber">
<img src="viber.png">
Viber Support
</a>

</div>

<div class="notice">
Club388 & Batman688 Official Agent<br>
Safe Deposit • Fast Withdraw
</div>

</div>
</div>

<script>

function spawnCoin(){

let coin=document.createElement("div")

coin.className="coin"
coin.innerHTML="💰"

coin.style.left=Math.random()*100+"%"
coin.style.animationDuration=(4+Math.random()*4)+"s"

document.body.appendChild(coin)

setTimeout(()=>{
coin.remove()
},8000)

}

setInterval(spawnCoin,500)

</script>

</body>
</html>
