<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Myanmar Gold 8 VIP - Club388® & Batman688® Agent</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-light: #f9edbe; 
            --gold-bright: #fff9e6;
            --gold-dark: #8a6d3b;
            --tg-blue: #24A1DE; 
            --viber-purple: #7360f2;
        }
        
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow: hidden;
        }

        /* 3D 前景金币 */
        .foreground-coins {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999; perspective: 1000px;
        }
        .coin {
            position: absolute; top: -60px; width: 36px; height: 36px;
            transform-style: preserve-3d; animation: fall-slow linear forwards;
        }
        .coin-inner {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d; animation: rotate-flat 4s linear infinite;
        }
        .face {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, var(--gold-bright) 0%, var(--gold) 50%, var(--gold-dark) 100%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 6px rgba(0,0,0,0.4);
            backface-visibility: hidden;
        }
        .face::after { content: "MMK"; font-size: 11px; font-weight: 900; color: #5c441a; }
        .side { 
            position: absolute; width: 100%; height: 100%; border-radius: 50%; 
            background: repeating-conic-gradient(from 0deg, var(--gold-dark) 0deg 3deg, var(--gold-bright) 3deg 6deg);
            transform: translateZ(-1px);
        }
        .front { transform: translateZ(1px); } 
        .back  { transform: translateZ(-1px) rotateY(180deg); }

        @keyframes rotate-flat { 0% { transform: rotateZ(0deg); } 100% { transform: rotateZ(360deg); } }
        @keyframes fall-slow { 0% { transform: translateY(0); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(115vh); opacity: 1; } }

        /* 卡片容器 */
        .card { 
            position: relative; background: rgba(20, 20, 20, 0.95); width: 88%; max-width: 380px; 
            padding: 4px; border-radius: 35px; text-align: center; overflow: hidden;
            backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.3); z-index: 10;
        }
        .card::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--gold));
            animation: rotate-border 4s linear infinite; z-index: -1;
        }
        @keyframes rotate-border { 100% { transform: rotate(360deg); } }
        .card-inner { background: #121212; border-radius: 32px; padding: 25px 18px; }

        /* Logo 区域呼吸效果 */
        .logo-area { position: relative; width: 110px; height: 110px; margin: 0 auto 12px; animation: breathe 3.5s ease-in-out infinite; }
        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4)); }
            50% { transform: scale(1.04); filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.7)); }
        }
        .logo { width: 100%; height: 100%; border-radius: 25px; overflow: hidden; border: 2.5px solid var(--gold); background: #1a1a1a; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        .verified-badge { position: absolute; bottom: 0; right: 0; background: #00c853; color: white; font-size: 10px; padding: 3px 8px; border-radius: 10px; border: 2px solid #121212; }

        h1 { font-size: 22px; color: var(--gold); margin: 5px 0; font-weight: 800; }
        .status { font-size: 12px; color: #44eb87; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 18px; line-height: 1; }
        .dot { width: 8px; height: 8px; background: #00c853; border-radius: 50%; box-shadow: 0 0 8px #00c853; animation: blink-dot 1.2s infinite ease-in-out; flex-shrink: 0; }
        @keyframes blink-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.85); } }

        /* 游戏展示 */
        .game-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .game-box { width: 85px; height: 85px; background: #000; border-radius: 20px; border: 1.5px solid rgba(212, 175, 55, 0.4); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .game-box .club { padding: 5px; object-fit: contain; }
        .game-box .batman { object-fit: cover; }
        .game-box img { width: 100%; height: 100%; }

        /* 支付图标 */
        .pay-row { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
        .pay-box { flex: 1; display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.03); padding: 12px 5px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); }
        .pay-icon-wrapper { width: 60px; height: 60px; border-radius: 14px; overflow: hidden; margin-bottom: 6px; background: #fff; }
        .pay-icon-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        /* 动感按钮组 */
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn { 
            position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-decoration: none; padding: 16px; border-radius: 22px; 
            color: white; overflow: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: btn-breathe 4s infinite ease-in-out;
        }
        @keyframes btn-breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        
        .btn::after {
            content: ""; position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: btn-shine 3.5s infinite;
        }
        @keyframes btn-shine { 0% { left: -100%; } 25% { left: 100%; } 100% { left: 100%; } }

        /* 按钮文字与图标对齐 */
        .btn-content { display: flex; align-items: center; gap: 10px; z-index: 1; }
        .btn-icon { width: 22px; height: 22px; fill: white; flex-shrink: 0; }
        .btn-main { font-weight: bold; font-size: 17px; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
        .btn-sub { font-size: 11px; opacity: 0.85; margin-top: 2px; z-index: 1; }
        
        .btn-tg { background: linear-gradient(135deg, #24A1DE, #1c82b6); box-shadow: 0 8px 15px rgba(36, 161, 222, 0.35); }
        .btn-viber { background: linear-gradient(135deg, #7360f2, #5d4ed1); box-shadow: 0 8px 15px rgba(115, 96, 242, 0.35); }
        .btn:active { transform: scale(0.95); }

        .notice { margin-top: 20px; font-size: 11px; color: #777; line-height: 1.6; }
        .brand-bold { color: var(--gold-light); font-weight: bold; }
        sup { font-size: 7px; vertical-align: top; position: relative; top: -2px; left: 1px; font-weight: normal; }
    </style>
</head>
<body>
    <div class="foreground-coins" id="coin-canvas"></div>

    <div class="card">
        <div class="card-inner">
            <div class="logo-area">
                <div class="logo"><img src="Gold-8-profile-logo-and-Banner.png" alt="Logo" onerror="this.style.background='#333'"></div>
                <div class="verified-badge">Verified Agent</div>
            </div>
            <h1>Gold 8 VIP Service</h1>
            <div class="status"><span class="dot"></span> <span>Online - အခုဆက်သွယ်နိုင်ပါသည်</span></div>

            <div class="game-row">
                <div class="game-box"><img src="club388.png" class="club" alt="Club388"></div>
                <div class="game-box"><img src="batman688.png" class="batman" alt="Batman688"></div>
            </div>

            <div class="pay-row">
                <div class="pay-box">
                    <div class="pay-icon-wrapper"><img src="Kpay.png" alt="KPay"></div>
                    <div class="pay-info"><strong>KBZPay</strong></div>
                </div>
                <div class="pay-box">
                    <div class="pay-icon-wrapper"><img src="WavePay.png" alt="WavePay"></div>
                    <div class="pay-info"><strong>WavePay</strong></div>
                </div>
            </div>

            <div class="btn-group">
                <!-- Telegram Button -->
                <a href="https://t.me" class="btn btn-tg">
                    <div class="btn-content">
                        <svg class="btn-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.11.02-1.93 1.23-5.46 3.62-.51.35-.98.52-1.4.51-.46-.01-1.35-.26-2.01-.48-.81-.27-1.45-.42-1.39-.89.03-.25.38-.51 1.07-.77 4.18-1.82 6.97-3.02 8.39-3.6 4-.1.83-.15 1.12-.15.06 0 .21.01.3.08.09.08.12.19.13.26.02.07.01.21 0 .28z"/></svg>
                        <span class="btn-main">Telegram တွင် ဆက်သွယ်ပါ</span>
                    </div>
                    <span class="btn-sub">ဂိမ်းယူနစ်ဝယ်ယူရန်</span>
                </a>
                
                <!-- Viber Button -->
                <a href="viber://chat?number=%2B95900000000" class="btn btn-viber">
                    <div class="btn-content">
                        <svg class="btn-icon" viewBox="0 0 24 24"><path d="M17.44 14.15c-.4-.17-.83-.34-1.28-.5-.45-.17-.92-.35-1.4-.55-.49-.2-.93-.41-1.32-.61-.4-.21-.71-.41-.95-.61s-.38-.4-.44-.6c-.06-.2-.04-.42.06-.66.1-.24.3-.51.58-.81s.62-.64.99-1.02c.38-.37.76-.78 1.15-1.2.39-.42.71-.85.95-1.29s.38-.88.42-1.32.02-.85-.05-1.22c-.08-.37-.21-.69-.4-.95s-.43-.45-.72-.56-.63-.15-1-.1c-.37.05-.77.17-1.2.36s-.87.45-1.33.78-1.01.81-1.63 1.43-1.24 1.45-1.85 2.52c-.61 1.07-1.12 2.3-1.52 3.69s-.61 2.87-.63 4.45c-.01 1.58.17 3.2.53 4.88.36 1.68.89 3.32 1.58 4.93.69 1.61 1.53 3.12 2.52 4.54l.03.04c-.49.03-.96.11-1.41.25s-.87.35-1.26.63-.73.63-.99 1.05-.44.9-.53 1.45c.42.05.86.1 1.3.15.45.05.9.11 1.37.16.47.05.94.1 1.42.15.48.05.97.1 1.46.15.35-.61.78-1.18 1.28-1.7s1.08-.98 1.73-1.38c.65-.4 1.38-.7 2.18-.89s1.67-.28 2.61-.28c.41 0 .82.02 1.23.05s.81.08 1.21.15.79.16 1.17.28.75.27 1.11.45l.13-.24c.43-.8.74-1.66.92-2.58s.26-1.89.24-2.88c-.02-.99-.18-1.99-.48-2.98s-.75-1.93-1.35-2.81c-.6-.88-1.36-1.66-2.28-2.35s-2-1.23-3.23-1.63z"/></svg>
                        <span class="btn-main">Viber တွင် ဆက်သွယ်ပါ</span>
                    </div>
                    <span class="btn-sub">ဂိမ်းယူနစ်ဝယ်ယူရန်</span>
                </a>
            </div>
            
            <div class="notice">
                <span class="brand-bold">Club388<sup>®</sup> & Batman688<sup>®</sup></span> တိုက်ရိုက်အေးဂျင့်<br>
                ယူနစ်သွင်း/ထုတ် မြန်ဆန်စိတ်ချရပါသည်
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('coin-canvas');
        function createCoin() {
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.innerHTML = `<div class="coin-inner"><div class="side"></div><div class="front face"></div><div class="back face"></div></div>`;
            coin.style.left = Math.random() * 100 + 'vw';
            const duration = Math.random() * 3 + 5;
            coin.style.animationDuration = duration + 's';
            canvas.appendChild(coin);
            setTimeout(() => { coin.remove(); }, duration * 1000);
        }
        setInterval(createCoin, 450);
    </script>
</body>
</html>
