<!DOCTYPE html>

<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Gold 8 VIP Agent</title>

<style>

:root{
--gold:#d4af37;
--gold-light:#fff2b0;
--tg:#24A1DE;
--viber:#7360f2;
}

body{
margin:0;
font-family:Segoe UI,Arial;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

/* SLOT BACKGROUND */

body::before{
content:"777 888 999";
position:fixed;
font-size:120px;
color:rgba(255,215,0,0.05);
top:0;
left:0;
width:200%;
animation:slotmove 20s linear infinite;
white-space:nowrap;
}

@keyframes slotmove{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* CARD */

.card{
width:360px;
padding:3px;
border-radius:30px;
background:linear-gradient(45deg,#d4af37,#fff4c2,#d4af37);
animation:borderGlow 6s linear infinite;
}

@keyframes borderGlow{
0%{filter:hue-rotate(0)}
100%{filter:hue-rotate(360deg)}
}

.card-inner{
background:#111;
border-radius:26px;
padding:25px;
text-align:center;
}

/* LOGO */

.logo{
width:110px;
height:110px;
margin:auto;
border-radius:20px;
overflow:hidden;
border:2px solid var(--gold);
box-shadow:0 0 20px rgba(212,175,55,.8);
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

/* TITLE */

h1{
margin:15px 0 8px;
color:var(--gold-light);
}

.status{
font-size:12px;
color:#5cff95;
margin-bottom:18px;
}

/* GAME */

.games{
display:flex;
gap:12px;
justify-content:center;
margin-bottom:18px;
}

.game{
width:80px;
height:80px;
border-radius:16px;
overflow:hidden;
border:1px solid rgba(212,175,55,.4);
}

.game img{
width:100%;
height:100%;
}

/* PAY */

.pay{
display:flex;
gap:10px;
margin-bottom:20px;
}

.paybox{
flex:1;
background:rgba(255,255,255,.05);
border-radius:14px;
padding:10px;
}

.paybox img{
width:50px;
height:50px;
object-fit:contain;
}

/* BUTTONS */

.buttons{
display:flex;
flex-direction:column;
gap:14px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:16px;
padding:16px;
border-radius:22px;
text-decoration:none;
color:white;
font-weight:bold;
font-size:16px;
transition:.2s;
}

.btn img{
width:60px;
height:60px;
object-fit:contain;
}

.btn-tg{
background:linear-gradient(90deg,#24A1DE,#1c82b6);
box-shadow:0 0 20px rgba(36,161,222,.9);
}

.btn-viber{
background:linear-gradient(90deg,#7360f2,#5d4ed1);
box-shadow:0 0 20px rgba(115,96,242,.9);
}

.btn:hover{
transform:scale(1.05);
}

/* NOTICE */

.notice{
margin-top:18px;
font-size:11px;
color:#aaa;
}

/* COINS */

.coin{
position:fixed;
top:-40px;
font-size:24px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh)}
}

/* POPUP */

.popup{
position:fixed;
bottom:20px;
right:20px;
background:#111;
border:1px solid gold;
padding:12px 16px;
border-radius:14px;
box-shadow:0 0 15px gold;
display:none;
}

.popup a{
color:gold;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">
<div class="card-inner">

<div class="logo">
<img src="logo.png">
</div>

<h1>Gold 8 VIP Service</h1>

<div class="status">🟢 Online - အခုဆက်သွယ်နိုင်ပါသည်</div>

<div class="games">

<div class="game">
<img src="club388.png">
</div>

<div class="game">
<img src="batman688.png">
</div>

</div>

<div class="pay">

<div class="paybox">
<img src="Kpay.png" alt="KBZPay">
<div>KBZPay</div>
</div>

<div class="paybox">
<img src="WavePay.png" alt="WavePay">
<div>WavePay</div>
</div>

</div>

<div class="buttons">

<a href="https://t.me/YOUR_TELEGRAM" class="btn btn-tg">
<img src="telegram.png">
Telegram Support
</a>

<a href="viber://chat?number=%2B959123456789" class="btn btn-viber">
<img src="viber.png">
Viber Support
</a>

</div>

<div class="notice">
Club388 & Batman688 Official Agent<br>
Fast Deposit • Fast Withdraw
</div>

</div>
</div>

<div class="popup" id="popup">
Need help? <a href="https://t.me/YOUR_TELEGRAM">Chat Support</a>
</div>

<script>

/* COINS */

function spawnCoin(){

let coin=document.createElement("div")

coin.className="coin"
coin.innerHTML="💰"

coin.style.left=Math.random()*100+"%"
coin.style.animationDuration=(4+Math.random()*4)+"s"

document.body.appendChild(coin)

setTimeout(()=>{coin.remove()},8000)

}

setInterval(spawnCoin,300)

/* POPUP */

setTimeout(()=>{
document.getElementById("popup").style.display="block"
},3000)

/* AUTO TELEGRAM (mobile only) */

setTimeout(()=>{

if(/Android|iPhone/i.test(navigator.userAgent)){
window.location.href="https://t.me/YOUR_TELEGRAM"
}

},8000)

</script>

</body>
</html>
