<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Myanmar Gold 8 VIP</title>
    <style>
        :root { 
            --gold-light: #fff3a6;
            --gold-mid: #d4af37;
            --gold-dark: #8a6d3b;
            --gold-shadow: #5c441a;
        }
        
        body { 
            background: #000;
            color: #fff; 
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0;
            overflow: hidden;
        }

        .foreground-coins {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
            perspective: 1200px;
        }

        /* 3D 实体金币 */
        .coin {
            position: absolute;
            top: -120px;
            width: 52px; height: 52px;
            transform-style: preserve-3d;
            animation: fall-slow linear forwards;
        }

        .coin-inner {
            position: relative;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            animation: rotate3d 3s linear infinite;
        }

        .face {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--gold-dark) 0%, var(--gold-light) 25%, var(--gold-mid) 50%, var(--gold-light) 75%, var(--gold-dark) 100%);
            border: 2px solid var(--gold-shadow);
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.3);
        }

        /* MMK 字体加大加粗 */
        .face::after {
            content: "MMK";
            font-size: 14px; /* 增大 */
            font-weight: 900; /* 加粗 */
            color: #4a3612;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.3);
        }

        /* 物理双面：前后拉开距离 */
        .front { transform: translateZ(3px); }
        .back  { transform: translateZ(-3px) rotateY(180deg); }

        /* 侧边 */
        .side {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: var(--gold-dark);
            transform: translateZ(0);
            border: 1px solid var(--gold-shadow);
        }

        @keyframes rotate3d {
            0% { transform: rotateY(0deg) rotateX(20deg); }
            100% { transform: rotateY(360deg) rotateX(20deg); }
        }

        /* 缓慢下落 */
        @keyframes fall-slow {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(115vh) rotate(45deg); opacity: 1; }
        }

        /* 核心卡片容器 */
        .card { position: relative; width: 92%; max-width: 380px; z-index: 10; }
        .card-inner { 
            position: relative; background: rgba(15, 15, 15, 0.88); 
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 40px; padding: 45px 20px; border: 1px solid rgba(212, 175, 55, 0.35);
            text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        /* Logo 区域修复：即便图丢了也会有金色底色 */
        .logo-area { 
            width: 90px; height: 90px; margin: 0 auto 15px; 
            border: 2.5px solid var(--gold-mid); border-radius: 25px; 
            overflow: hidden; position: relative;
            background: linear-gradient(45deg, var(--gold-dark), var(--gold-light));
            box-shadow: 0 5px 15px rgba(212,175,55,0.3);
        }
        .logo-area img { width: 100%; height: 100%; object-fit: cover; display: block; }

        h1 { font-size: 24px; color: var(--gold-mid); margin: 12px 0; font-weight: 800; letter-spacing: 0.5px; }
        
        .status { font-size: 14px; color: #44eb87; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 35px; }
        .dot { width: 10px; height: 10px; background: #00c853; border-radius: 50%; box-shadow: 0 0 10px #00c853; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 巨型支付 Logo (80px) */
        .pay-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .pay-box { flex: 1; background: rgba(255,255,255,0.06); padding: 25px 10px; border-radius: 30px; border: 1px solid rgba(212, 175, 55, 0.2); }
        .pay-icon { width: 80px; height: 80px; margin-bottom: 15px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        .pay-box strong { color: #fff; font-size: 14px; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn { text-decoration: none; padding: 20px; border-radius: 22px; font-weight: bold; font-size: 17px; color: white; transition: 0.3s; text-align: center; }
        .btn-tg { background: linear-gradient(135deg, #24A1DE, #1c82b6); }
        .btn-viber { background: linear-gradient(135deg, #7360f2, #5d4ed1); }
        .btn:active { transform: scale(0.96); }
        .notice { margin-top: 30px; font-size: 12px; color: #777; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="foreground-coins" id="coin-canvas"></div>

    <div class="card">
        <div class="card-inner">
            <div class="logo-area">
                <!-- 这里的路径请确保正确 -->
                <img src="Gold-8-profile-logo-and-Banner.png" alt="Logo" onerror="this.style.opacity='0'">
            </div>
            <h1>VIP Gold 8 Service</h1>
            <div class="status"><span class="dot"></span> Online ဝန်ဆောင်မှုရှိနေပါသည်</div>
            
            <div class="pay-row">
                <div class="pay-box">
                    <img src="Kpay.png" class="pay-icon" alt="K" onerror="this.style.background='#0056B3'">
                    <div><strong>KBZPay</strong></div>
                </div>
                <div class="pay-box">
                    <img src="WavePay.png" class="pay-icon" alt="W" onerror="this.style.background='#F6C000'">
                    <div><strong>WavePay</strong></div>
                </div>
            </div>

            <div class="btn-group">
                <a href="https://t.me" class="btn btn-tg">Telegram တွင် ဆက်သွယ်ပါ</a>
                <a href="viber://chat?number=%2B95900000000" class="btn btn-viber">Viber တွင် ဆက်သွယ်ပါ</a>
            </div>
            <div class="notice">မြန်မာနိုင်ငံ၏ စိတ်ချရဆုံးနှင့် အမြန်ဆန်ဆုံး ဝန်ဆောင်မှု</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('coin-canvas');
        function createCoin() {
            const coin = document.createElement('div');
            coin.className = 'coin';
            
            coin.innerHTML = `
                <div class="coin-inner">
                    <div class="side"></div>
                    <div class="front face"></div>
                    <div class="back face"></div>
                </div>
            `;
            
            coin.style.left = Math.random() * 100 + 'vw';
            
            // 下落速度调慢：4秒到7秒之间随机
            const duration = Math.random() * 3 + 4;
            coin.style.animationDuration = duration + 's';
            
            const scale = Math.random() * 0.4 + 0.8;
            coin.style.transform = `scale(${scale})`;

            canvas.appendChild(coin);

            // 掉出屏幕后移除
            setTimeout(() => {
                coin.remove();
            }, duration * 1000);
        }

        // 数量减稀：每 250 毫秒生成一个
        setInterval(createCoin, 250);
    </script>
</body>
</html>
