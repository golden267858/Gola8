<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Myanmar Gold 8 VIP - Club388® & Batman688® Agent</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-light: #f9edbe; 
            --gold-bright: #fff9e6;
            --gold-dark: #8a6d3b;
            --tg-blue: #24A1DE; 
            --viber-purple: #7360f2;
        }
        
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow: hidden;
        }

        /* 3D 前景金币动画样式 */
        .foreground-coins {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999; perspective: 1000px;
        }
        .coin {
            position: absolute; top: -60px; width: 36px; height: 36px;
            transform-style: preserve-3d; animation: fall-slow linear forwards;
        }
        .coin-inner {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d; animation: rotate-flat 4s linear infinite;
        }
        .face {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, var(--gold-bright) 0%, var(--gold) 50%, var(--gold-dark) 100%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 6px rgba(0,0,0,0.4);
            backface-visibility: hidden;
        }
        .face::after { content: "MMK"; font-size: 11px; font-weight: 900; color: #5c441a; }
        .side { 
            position: absolute; width: 100%; height: 100%; border-radius: 50%; 
            background: repeating-conic-gradient(from 0deg, var(--gold-dark) 0deg 3deg, var(--gold-bright) 3deg 6deg);
            transform: translateZ(-1px);
        }
        .front { transform: translateZ(1px); } 
        .back  { transform: translateZ(-1px) rotateY(180deg); }

        @keyframes rotate-flat { 0% { transform: rotateZ(0deg); } 100% { transform: rotateZ(360deg); } }
        @keyframes fall-slow { 0% { transform: translateY(0); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(115vh); opacity: 1; } }

        /* 卡片容器 */
        .card { 
            position: relative; background: rgba(20, 20, 20, 0.95); width: 88%; max-width: 380px; 
            padding: 4px; border-radius: 35px; text-align: center; overflow: hidden;
            backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.3); z-index: 10;
        }
        .card::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--gold));
            animation: rotate-border 4s linear infinite; z-index: -1;
        }
        @keyframes rotate-border { 100% { transform: rotate(360deg); } }
        .card-inner { background: #121212; border-radius: 32px; padding: 25px 18px; }

        .logo-area { position: relative; width: 120px; height: 120px; margin: 0 auto 12px; animation: breathe 3s ease-in-out infinite; }
        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4)); }
            50% { transform: scale(1.04); filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.7)); }
        }
        .logo { width: 100%; height: 100%; border-radius: 25px; overflow: hidden; border: 2.5px solid var(--gold); background: #1a1a1a; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        .verified-badge { position: absolute; bottom: 0; right: 0; background: #00c853; color: white; font-size: 10px; padding: 3px 8px; border-radius: 10px; border: 2px solid #121212; }

        h1 { font-size: 22px; color: var(--gold); margin: 5px 0; font-weight: 800; }
        
        .status { 
            font-size: 12px; color: #44eb87; 
            display: flex; align-items: center; justify-content: center; 
            gap: 6px; margin-bottom: 18px; line-height: 1;
        }
        .dot { 
            width: 8px; height: 8px; background: #00c853; border-radius: 50%; 
            box-shadow: 0 0 8px #00c853; animation: blink-dot 1.2s infinite ease-in-out; 
        }
        @keyframes blink-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.85); } }

        .game-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .game-box { width: 85px; height: 85px; background: #000; border-radius: 20px; border: 1.5px solid rgba(212, 175, 55, 0.4); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .game-box img { width: 100%; height: 100%; }

        /* 新增：赢钱滚动条样式 */
        .gola-ticker-wrap {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 6px 0;
            overflow: hidden;
            white-space: nowrap;
        }
        .gola-ticker-content {
            display: inline-block;
            animation: golaScroll 25s linear infinite;
            color: #f9edbe;
            font-size: 12.5px;
            font-weight: bold;
        }
        @keyframes golaScroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .pay-row { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
        .pay-box { flex: 1; display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.03); padding: 12px 5px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); }
        .pay-icon-wrapper { width: 60px; height: 60px; border-radius: 14px; overflow: hidden; margin-bottom: 6px; background: #fff; }
        .pay-icon-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        /* 按钮样式优化：加入缩放和呼吸灯 */
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn { 
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; padding: 12px 20px; border-radius: 22px; 
            color: white; transition: 0.2s; gap: 15px;
            /* 核心：纵向缩小20% */
            transform: scaleY(0.8);
        }
        
        /* 核心：呼吸灯效果 */
        .btn-breathe {
            animation: goldGlow 2.5s infinite ease-in-out;
        }
        @keyframes goldGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(212, 175, 55, 0.2); filter: brightness(1); }
            50% { box-shadow: 0 0 18px rgba(212, 175, 55, 0.7); filter: brightness(1.2); transform: scaleY(0.83) scaleX(1.02); }
        }

        .btn-main { font-weight: bold; font-size: 16px; display: block; text-align: left; }
        .btn-sub { font-size: 11px; opacity: 0.9; display: block; text-align: left; }
        .btn-tg { background: linear-gradient(90deg, #24A1DE, #1c82b6); }
        .btn-viber { background: linear-gradient(90deg, #7360f2, #5d4ed1); }
        
        .btn:active { transform: scaleY(0.78) scaleX(0.96); filter: brightness(0.9); }

        .notice { margin-top: 20px; font-size: 11px; color: #777; line-height: 1.6; }
        .brand-bold { color: var(--gold-light); font-weight: bold; }
        sup { font-size: 7px; vertical-align: top; position: relative; top: -2px; left: 1px; }
    </style>
</head>
<body>
    <div class="foreground-coins" id="coin-canvas"></div>

    <div class="card">
        <div class="card-inner">
            <div class="logo-area">
                <div class="logo"><img src="logo.png" alt="Logo" onerror="this.style.background='#333'"></div>
                <div class="verified-badge">Verified Agent</div>
            </div>
            <h1>Gold 8 VIP Service</h1>
            
            <div class="status">
                <span class="dot"></span>
                <span>Online - အခုဆက်သွယ်နိုင်ပါသည်</span>
            </div>

            <div class="game-row">
                <div class="game-box"><img src="club388.png" alt="Club388"></div>
                <div class="game-box"><img src="batman688.png" alt="Batman688"></div>
            </div>

            <!-- 新增：赢钱滚动条（放在银行上方） -->
            <div class="gola-ticker-wrap">
                <div class="gola-ticker-content" id="winner-list">Loading...</div>
            </div>

            <div class="pay-row">
                <div class="pay-box">
                    <div class="pay-icon-wrapper"><img src="Kpay.png" alt="KPay"></div>
                    <div class="pay-info"><strong>KBZPay</strong></div>
                </div>
                <div class="pay-box">
                    <div class="pay-icon-wrapper"><img src="WavePay.png" alt="WavePay"></div>
                    <div class="pay-info"><strong>WavePay</strong></div>
                </div>
            </div>

            <div class="btn-group">
                <!-- Telegram 按钮：已添加缩放和呼吸效果 -->
                <a href="https://t.me" class="btn btn-tg btn-breathe" style="border: 2px solid rgba(255,255,255,0.4);">
                    <img src="telegram.png" alt="TG" width="30">
                    <div>
                        <span class="btn-main">Telegram ဆက်သွယ်ရန်</span>
                        <span class="btn-sub">Click to chat with us</span>
                    </div>
                </a>
                
                <!-- Viber 按钮：已添加缩放和呼吸效果 -->
                <a href="viber://pa?chatURI=gola8888" class="btn btn-viber btn-breathe" style="border: 2px solid rgba(255,255,255,0.4);">
                    <img src="viber.png" alt="Viber" width="30">
                    <div>
                        <span class="btn-main">Viber ဆက်သွယ်ရန်</span>
                        <span class="btn-sub">Customer Service 24/7</span>
                    </div>
                </a>
            </div>

            <div class="notice">
                <p>Welcome to <span class="brand-bold">Gold 8 VIP</span>. Trusted service with 100% guarantee.</p>
            </div>
        </div>
    </div>

    <script>
        // 1. 金币下落逻辑 (保持原样)
        const canvas = document.getElementById('coin-canvas');
        function createCoin() {
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.style.left = Math.random() * 100 + 'vw';
            coin.style.animationDuration = (Math.random() * 3 + 4) + 's';
            coin.innerHTML = '<div class="coin-inner"><div class="face front"></div><div class="face back"></div><div class="side"></div></div>';
            canvas.appendChild(coin);
            setTimeout(() => coin.remove(), 7000);
        }
        setInterval(createCoin, 400);

        // 2. 随机赢钱名单生成逻辑
        const mimes = ['097', '099', '094', '092', '098', '096'];
        function initWinners() {
            let html = "";
            for(let i=0; i<15; i++) {
                let phone = mimes[Math.floor(Math.random()*mimes.length)] + "****" + Math.floor(Math.random()*999);
                let amount = (Math.floor(Math.random() * 45) + 5) * 10000;
                html += ` 🎉 အသုံးပြုသူ [${phone}] မှ ${amount.toLocaleString()} MMK အနိုင်ရရှိသွားပါသည်။ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; `;
            }
            document.getElementById('winner-list').innerHTML = html + html;
        }
        initWinners();
    </script>
</body>
</html>
