<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold 8 VIP - Myanmar Official Agent</title>
    <style>
        :root { --gold: #d4af37; --gold-light: #f9edbe; --gold-dark: #8a6d3b; }
        body { background: #000; color: #fff; font-family: 'Pyidaungsu', 'Segoe UI', Arial, sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        /* 预加载遮罩 */
        #preloader { position:fixed; top:0; left:0; width:100%; height:100%; background:#121212; z-index:10000; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .loader { width:40px; height:40px; border:3px solid rgba(212,175,55,0.2); border-top:3px solid var(--gold); border-radius:50%; animation:s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
        .fade-out { opacity: 0; transition: opacity 0.5s; pointer-events: none; }

        /* 3D 金币雨 */
        .foreground-coins { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; perspective: 1000px; }
        .coin { position: absolute; top: -60px; transform-style: preserve-3d; animation: fall-slow linear forwards; }
        .coin-inner { position: relative; width: 30px; height: 30px; transform-style: preserve-3d; animation: rotate-flat 4s linear infinite; }
        .face { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff9e6 0%, var(--gold) 50%, var(--gold-dark) 100%); border: 1px solid rgba(255,255,255,0.3); backface-visibility: hidden; }
        .back { transform: rotateY(180deg); }
        @keyframes rotate-flat { to { transform: rotateZ(360deg); } }
        @keyframes fall-slow { 0% { transform: translateY(0); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(110vh); opacity: 1; } }

        /* 流光卡片主体 */
        .card { position: relative; background: #121212; width: 92%; max-width: 380px; padding: 3px; border-radius: 35px; overflow: hidden; border: 1px solid rgba(212,175,55,0.3); z-index: 10; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .card::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, transparent, var(--gold), transparent); animation: rotate-border 4s linear infinite; }
        @keyframes rotate-border { 100% { transform: rotate(360deg); } }
        .card-inner { background: #121212; border-radius: 32px; padding: 25px 20px; position: relative; display: flex; flex-direction: column; align-items: center; }

        /* 跑马灯 */
        .top-ticker { background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.3); border-radius: 50px; margin-bottom: 20px; padding: 6px 0; overflow: hidden; display: flex; width: 100%; }
        .ticker-move { display: inline-block; white-space: nowrap; animation: ticker 45s linear infinite; color: var(--gold-light); font-size: 11px; font-weight: bold; }
        @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* LOGO居中 */
        .logo-area { position: relative; width: 110px; height: 110px; margin: 0 auto 15px; display: block; }
        .logo { width: 100%; height: 100%; border-radius: 25px; overflow: hidden; border: 2.5px solid var(--gold); background: #1a1a1a; box-shadow: 0 0 15px rgba(212,175,55,0.3); }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        .verified { position: absolute; bottom: -5px; right: -5px; background: #00c853; color: #fff; font-size: 10px; padding: 3px 8px; border-radius: 8px; border: 2px solid #121212; font-weight: bold; }

        /* 文字居中 */
        h1 { font-size: 22px; color: var(--gold); margin: 10px 0 5px; text-align: center; text-transform: uppercase; font-weight: 800; }
        .status { font-size: 13px; color: #44eb87; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 25px; text-align: center; }
        .dot { width: 9px; height: 9px; background: #00c853; border-radius: 50%; animation: blink 1s infinite; box-shadow: 0 0 8px #00c853; }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.8); } }

        /* 按钮与加大图标 */
        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .btn { display: flex; align-items: center; justify-content: flex-start; text-decoration: none; padding: 15px 20px; border-radius: 22px; color: white; gap: 18px; transition: 0.3s; border: 1px solid rgba(255,255,255,0.15); animation: pulse 2.5s infinite; }
        
        /* 加大图标尺寸 */
        .btn-icon { width: 55px; height: 55px; flex-shrink: 0; }
        
        .btn-tg { background: linear-gradient(135deg, #24A1DE, #1c82b6); }
        .btn-vb { background: linear-gradient(135deg, #7360f2, #5d4ed1); }
        
        .btn-text { text-align: left; }
        .btn-main { font-weight: bold; font-size: 17px; display: block; margin-bottom: 2px; }
        .btn-sub { font-size: 11px; opacity: 0.85; display: block; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 5px 15px rgba(0,0,0,0.3); } 50% { transform: scale(0.97); filter: brightness(1.1); box-shadow: 0 8px 20px rgba(212,175,55,0.2); } }

        .notice { margin-top: 20px; font-size: 11px; color: #888; line-height: 1.6; text-align: center; }
        .brand-footer { color: var(--gold-light); font-weight: bold; }
    </style>
</head>
<body>

                        <span class="btn-main">Telegram ဆက်သွယ်ရန်</span>

    </div>

    <script>
        // 加载控制
        window.addEventListener('load', () => {
            setTimeout(() => { 
                const preloader = document.getElementById('preloader');
                preloader.classList.add('fade-out');
                setTimeout(() => preloader.style.display = 'none', 600);
            }, 600);
        });

        // 随机中奖名单逻辑
        const mimes = ['097', '099', '094', '092', '098', '096'];
        function initTicker() {
            let html = "";
            for(let i=0; i<15; i++){
                let p = mimes[Math.floor(Math.random()*mimes.length)] + "****" + Math.floor(Math.random()*999);
                let amt = (Math.floor(Math.random()*45)+5)*10000;
                html += `<span> 💰 [${p}] သည် ${amt.toLocaleString()} MMK အနိုင်ရရှိသွားပါသည်။ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>`;
            }
            document.getElementById('winners-list').innerHTML = html + html;
        }
        initTicker();

        // 3D 金币雨逻辑
        const canvas = document.getElementById('coin-canvas');
        function spawnCoin(d=0) {
            const c = document.createElement('div');
            c.className = 'coin';
            c.style.left = Math.random()*100+'%';
            c.style.animationDelay = d+'s';
            c.style.animationDuration = (4.5+Math.random()*4.5)+'s';
            c.innerHTML = `<div class="coin-inner"><div class="face"></div><div class="face back"></div></div>`;
            canvas.appendChild(c);
            c.addEventListener('animationend', () => { c.remove(); spawnCoin(0); });
        }
        for(let i=0; i<12; i++) spawnCoin(Math.random()*5);
    </script>

</html>
