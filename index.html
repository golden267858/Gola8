<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold 8 VIP - Gaming Center</title>
    <style>
        /* 基础样式保持不变 */
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #000; color: #fff; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; padding: 10px; }
        img { max-width: 100%; height: auto; }

        /* 1. 赢钱滚动条样式 */
        .winner-ticker {
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid #ffd700;
            margin: 10px 0;
            padding: 5px;
            overflow: hidden;
            white-space: nowrap;
            border-radius: 5px;
            font-size: 14px;
            color: #ffd700;
        }
        .ticker-content {
            display: inline-block;
            animation: scroll-left 15s linear infinite;
        }
        @keyframes scroll-left {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* 2. 按钮样式优化：缩小20% + 呼吸效果 */
        .btn-link {
            display: block;
            margin: 15px auto;
            width: 80%; /* 保持宽度 */
            transform: scaleY(0.8); /* 纵向缩小20% */
            transition: transform 0.3s;
        }

        .breathing-effect {
            animation: breathe 2s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scaleY(0.8) scaleX(1); box-shadow: 0 0 5px rgba(255,255,255,0.2); }
            50% { transform: scaleY(0.85) scaleX(1.02); box-shadow: 0 0 20px rgba(255,215,0,0.6); }
        }

        .bank-icons { margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 顶部 Logo/Header -->
    <img src="https://github.io" alt="Gold 8 Logo">

    <!-- 3. 随机赢钱滚动条 (放在银行标志上方) -->
    <div class="winner-ticker">
        <div class="ticker-content" id="ticker">
            <!-- JS 将在此处生成随机内容 -->
            Loading winners...
        </div>
    </div>

    <!-- 银行标志部分 -->
    <div class="bank-icons">
        <img src="https://github.io" alt="KBZPay WavePay">
    </div>

    <!-- 4. Telegram 按钮 -->
    <a href="https://t.me" class="btn-link breathing-effect">
        <img src="https://github.io" alt="Telegram">
    </a>

    <!-- 5. Viber 按钮 -->
    <a href="viber://chat?number=yournumber" class="btn-link breathing-effect">
        <img src="https://github.io" alt="Viber">
    </a>

    <!-- 其余展示图片 -->
    <img src="https://github.io" alt="Games">
</div>

<script>
    // 随机生成赢钱信息
    const ticker = document.getElementById('ticker');
    const prefixes = ['097', '099', '094', '092', '098'];
    
    function generateWinners() {
        let text = "";
        for(let i=0; i<10; i++) {
            let phone = prefixes[Math.floor(Math.random()*prefixes.length)] + "****" + Math.floor(Math.random()*999);
            let amount = (Math.floor(Math.random() * 50) + 5) * 10000; // 5万到50万之间
            text += ` 🎉 အသုံးပြုသူ [${phone}] သည် ${amount.toLocaleString()} MMK အနိုင်ရရှိသွားပါသည်။ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; `;
        }
        ticker.innerHTML = text + text; // 复制一遍实现无缝滚动
    }

    generateWinners();
</script>

</body>
</html>
