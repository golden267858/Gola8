<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold 8 VIP - Official Agent</title>
    <!-- 引入 FontAwesome 官方图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-light: #f9edbe; 
            --gold-bright: #fff9e6;
            --gold-dark: #8a6d3b;
            --tg-blue: #24A1DE; 
            --viber-purple: #7360f2;
        }
        
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow: hidden;
        }

        /* 3D 金币动画 */
        .foreground-coins { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; perspective: 1000px; }
        .coin { position: absolute; top: -60px; width: 28px; height: 28px; transform-style: preserve-3d; animation: fall-slow linear forwards; will-change: transform; }
        .coin-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; animation: rotate-flat 4s linear infinite; }
        .face { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 35% 35%, var(--gold-bright) 0%, var(--gold) 50%, var(--gold-dark) 100%); border: 1px solid rgba(255, 255, 255, 0.3); display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 5px rgba(0,0,0,0.4); backface-visibility: hidden; }
        .face::after { content: "MMK"; font-size: 8px; font-weight: 900; color: #5c441a; }
        @keyframes rotate-flat { 0% { transform: rotateZ(0deg); } 100% { transform: rotateZ(360deg); } }
        @keyframes fall-slow { 0% { transform: translateY(0) rotateY(0); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(110vh) rotateY(360deg); opacity: 1; } }

        /* 卡片容器 */
        .card { 
            position: relative; background: rgba(18, 18, 18, 0.96); width: 92%; max-width: 350px; 
            padding: 2.5px; border-radius: 28px; text-align: center; overflow: hidden;
            backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.3); z-index: 10;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .card::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--gold));
            animation: rotate-border 4s linear infinite; z-index: -1;
        }
        @keyframes rotate-border { 100% { transform: rotate(360deg); } }
        .card-inner { background: #121212; border-radius: 26px; padding: 22px 16px; }

        .logo-area { position: relative; width: 90px; height: 90px; margin: 0 auto 12px; animation: breathe 3s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--gold)); } 50% { transform: scale(1.05); filter: drop-shadow(0 0 15px var(--gold)); } }
        .logo { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; border: 2px solid var(--gold); }
        .logo img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 19px; color: var(--gold); margin: 5px 0; font-weight: 800; letter-spacing: 0.5px; }
        .status { font-size: 11px; color: #44eb87; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 18px; }
        .dot { width: 7px; height: 7px; background: #00c853; border-radius: 50%; box-shadow: 0 0 8px #00c853; animation: blink-dot 1.5s infinite; }
        @keyframes blink-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* 紧凑游戏排版 */
        .game-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .game-box { background: rgba(255,255,255,0.04); border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.15); padding: 6px 10px; display: flex; align-items: center; gap: 8px; }
        .game-box img { width: 28px; height: 28px; border-radius: 6px; }
        .game-box span { font-size: 12px; font-weight: 700; color: #ddd; }

        /* 支付工具 - 带图标 */
        .pay-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .pay-box { background: rgba(255,255,255,0.06); padding: 8px; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid rgba(255,255,255,0.08); }
        .pay-box img { width: 20px; height: 20px; border-radius: 4px; object-fit: contain; }
        .pay-box span { font-size: 11px; font-weight: 600; color: #bbb; }

        /* 联系按钮 - 已缩小 */
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn { 
            display: flex; align-items: center; text-decoration: none; 
            padding: 10px 18px; border-radius: 16px; color: white; transition: 0.2s;
        }
        .btn i { font-size: 20px; width: 30px; text-align: center; margin-right: 12px; }
        .btn-text { text-align: left; }
        .btn-main { display: block; font-weight: bold; font-size: 14px; }
        .btn-sub { display: block; font-size: 10px; opacity: 0.8; }
        
        .btn-tg { background: linear-gradient(90deg, #24A1DE, #1c82b6); }
        .btn-viber { background: linear-gradient(90deg, #7360f2, #5d4ed1); }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:active { transform: scale(0.97); }

        .notice { margin-top: 18px; font-size: 10px; color: #555; line-height: 1.5; }
        .brand-bold { color: var(--gold-light); font-weight: 600; }
    </style>
</head>
<body>
    <div class="foreground-coins" id="coin-canvas"></div>

    <div class="card">
        <div class="card-inner">
            <div class="logo-area">
                <!-- 请替换为您自己的 Logo 图片链接 -->
                <div class="logo"><img src="Gold-8-profile-logo-and-Banner.png" alt="Gold 8 Logo" onerror="this.src='https://via.placeholder.com/100/d4af37/000000?text=8'"></div>
            </div>
            <h1>Gold 8 VIP Service</h1>
            
            <div class="status">
                <div class="dot"></div>
                <span>Online - အခုဆက်သွယ်နိုင်ပါသည်</span>
            </div>

            <!-- 游戏平台排版 -->
            <div class="game-row">
                <div class="game-box">
                    <img src="club388.png" alt="C" onerror="this.src='https://via.placeholder.com/30/d4af37/ffffff?text=C'">
                    <span>Club388</span>
                </div>
                <div class="game-box">
                    <img src="batman688.png" alt="B" onerror="this.src='https://via.placeholder.com/30/d4af37/ffffff?text=B'">
                    <span>Batman688</span>
                </div>
            </div>

            <!-- 支付工具 -->
            <div class="pay-row">
                <div class="pay-box">
                    <img src="Kpay.png" alt="K" onerror="this.src='https://via.placeholder.com/20/24A1DE/ffffff?text=K'">
                    <span>KBZPay</span>
                </div>
                <div class="pay-box">
                    <img src="WavePay.png" alt="W" onerror="this.src='https://via.placeholder.com/20/f9edbe/000000?text=W'">
                    <span>WavePay</span>
                </div>
            </div>

            <!-- 联系按钮 - 已缩小外框并添加官方LOGO -->
            <div class="btn-group">
                <a href="https://t.me/YOUR_USERNAME" class="btn btn-tg">
                    <i class="fa-brands fa-telegram"></i>
                    <div class="btn-text">
                        <span class="btn-main">Telegram တွင် ဆက်သွယ်ပါ</span>
                        <span class="btn-sub">ယူနစ်ဝယ်ယူရန် / Contact Agent</span>
                    </div>
                </a>
                <a href="viber://chat?number=%2B95900000000" class="btn btn-viber">
                    <i class="fa-brands fa-viber"></i>
                    <div class="btn-text">
                        <span class="btn-main">Viber တွင် ဆက်သွယ်ပါ</span>
                        <span class="btn-sub">ယူနစ်ဝယ်ယူရန် / Contact Agent</span>
                    </div>
                </a>
            </div>
            
            <div class="notice">
                <span class="brand-bold">Club388® & Batman688®</span> Direct Agent<br>
                မြန်ဆန်စိတ်ချရသော ဝန်ဆောင်မှု
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('coin-canvas');
        function createCoin() {
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.innerHTML = `<div class="coin-inner"><div class="face"></div></div>`;
            coin.style.left = Math.random() * 100 + 'vw';
            const duration = Math.random() * 2 + 3;
            coin.style.animationDuration = duration + 's';
            canvas.appendChild(coin);
            setTimeout(() => { coin.remove(); }, duration * 1000);
        }
        setInterval(createCoin, 600);
    </script>
</body>
</html>
