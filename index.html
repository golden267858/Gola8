<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Gold 8 VIP</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --tg-blue: #24A1DE; 
            --viber-purple: #7360f2; 
        }
        
        body { 
            background: #000;
            color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
            overflow: hidden;
        }

        /* 外部容器 */
        .card { 
            position: relative; 
            width: 90%; 
            max-width: 360px; 
            padding: 2px; 
            border-radius: 35px; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(212, 175, 55, 0.1);
        }

        /* 零散金币飘落动画 */
        .card::before, .card::after {
            content: "🪙  🪙      🪙  🪙\n\n🪙      🪙  🪙  🪙\n\n  🪙  🪙      🪙";
            position: absolute;
            top: -100%;
            width: 100%;
            text-align: center;
            font-size: 24px;
            white-space: pre;
            z-index: 0;
            filter: drop-shadow(0 0 5px var(--gold));
        }

        .card::before {
            animation: coinFall 6s linear infinite;
        }

        .card::after {
            animation: coinFall 8s linear infinite 3s; /* 延迟错开 */
            left: -10px;
        }

        @keyframes coinFall {
            0% { top: -50%; opacity: 0; transform: translateX(0) rotate(0deg); }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 110%; opacity: 0; transform: translateX(10px) rotate(360deg); }
        }

        /* 内部透明卡片 */
        .card-inner { 
            position: relative;
            width: 100%;
            background: rgba(15, 15, 15, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-radius: 33px; 
            padding: 30px 15px; 
            z-index: 1;
            border: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center; /* 全局居中 */
        }

        .logo-area { position: relative; width: 85px; height: 85px; margin: 0 auto 15px; }
        .logo { 
            width: 100%; height: 100%; border-radius: 20px; overflow: hidden;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); border: 2px solid var(--gold);
        }
        .logo img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 20px; color: var(--gold); margin: 10px 0; text-shadow: 0 2px 4px #000; }
        
        .status { 
            font-size: 12px; color: #00c853; 
            display: flex; align-items: center; justify-content: center; 
            gap: 6px; margin-bottom: 20px; 
        }
        .dot { width: 7px; height: 7px; background: #00c853; border-radius: 50%; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 并列支付布局 */
        .pay-row { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 25px; 
        }
        .pay-box { 
            flex: 1; /* 平分宽度 */
            display: flex; 
            flex-direction: column; /* 图标文字上下排 */
            align-items: center; 
            background: rgba(255,255,255,0.06); 
            padding: 12px 5px; 
            border-radius: 18px; 
            border: 1px solid rgba(255,255,255,0.08);
            max-width: 110px; /* 限制宽度 */
        }
        .pay-icon { width: 28px; height: 28px; margin-bottom: 8px; border-radius: 6px; }
        .pay-info strong { color: #fff; font-size: 12px; }

        /* 按钮组 */
        .btn-group { display: flex; flex-direction: column; gap: 10px; padding: 0 10px; }
        .btn { 
            display: flex; align-items: center; justify-content: center; gap: 8px;
            text-decoration: none; padding: 14px; border-radius: 16px; font-weight: bold; font-size: 15px; transition: 0.3s;
        }
        .btn-tg { background: linear-gradient(90deg, #24A1DE, #1c82b6); color: white; }
        .btn-viber { background: linear-gradient(90deg, var(--viber-purple), #5d4ed1); color: white; }
        .btn:active { transform: scale(0.96); }

        .notice { margin-top: 20px; font-size: 10px; color: #888; line-height: 1.5; padding: 0 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-inner">
            <div class="logo-area">
                <div class="logo">
                    <img src="Gold-8-profile-logo-and-Banner.png" alt="Logo" onerror="this.style.background='#333'">
                </div>
            </div>
            
            <h1>VIP Gold 8 Service</h1>
            <div class="status"><span class="dot"></span> Online ဝန်ဆောင်မှုရှိနေပါသည်</div>

            <!-- 并列支付框 -->
            <div class="pay-row">
                <div class="pay-box">
                    <img src="Kpay.png" class="pay-icon" alt="K" onerror="this.style.background='#eee'">
                    <div class="pay-info"><strong>KBZPay</strong></div>
                </div>
                <div class="pay-box">
                    <img src="WavePay.png" class="pay-icon" alt="W" onerror="this.style.background='#eee'">
                    <div class="pay-info"><strong>WavePay</strong></div>
                </div>
            </div>

            <div class="btn-group">
                <a href="https://t.me" class="btn btn-tg">
                    Telegram တွင် ဆက်သွယ်ပါ
                </a>
                <a href="viber://chat?number=%2B95900000000" class="btn btn-viber">
                    Viber တွင် ဆက်သွယ်ပါ
                </a>
            </div>

            <div class="notice">
                မြန်မာနိုင်ငံ၏ စိတ်ချရဆုံးနှင့် အမြန်ဆန်ဆုံး ဝန်ဆောင်မှု<br>
                (၂၄) နာရီ စိတ်ကြိုက်မေးမြန်းနိုင်ပါသည်
            </div>
        </div>
    </div>
</body>
</html>
