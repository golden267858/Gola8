<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gold 8 VIP 3D Luxury</title>

<style>

/* ===== 3D SCENE ===== */
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at center,#111,#000);
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
perspective:1000px;
color:white;
}

/* GOLD LIGHT BACK */
body::before{
content:"";
position:fixed;
width:800px;
height:800px;
background:radial-gradient(circle,rgba(212,175,55,0.15),transparent 60%);
top:50%;
left:50%;
transform:translate(-50%,-50%);
filter:blur(40px);
}

/* ===== CARD 3D ===== */
.card{
width:360px;
background:rgba(20,20,20,0.85);
border-radius:28px;
padding:25px;
text-align:center;
border:1px solid rgba(212,175,55,0.4);
transform-style:preserve-3d;
transform:rotateX(6deg) rotateY(-6deg);
box-shadow:0 30px 80px rgba(0,0,0,0.6);
animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:rotateX(6deg) rotateY(-6deg) translateY(0)}
50%{transform:rotateX(6deg) rotateY(-6deg) translateY(-10px)}
}

/* ===== LOGO ===== */
.logo{
width:110px;
height:110px;
margin:auto;
border-radius:20px;
overflow:hidden;
border:2px solid gold;
box-shadow:0 0 25px rgba(212,175,55,0.6);
transform:translateZ(20px);
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

/* ===== TITLE ===== */
h1{
color:#ffd700;
margin:10px 0;
transform:translateZ(15px);
}

/* ===== STATUS ===== */
.status{
font-size:12px;
color:#4cff9a;
transform:translateZ(10px);
}

/* ===== SLOT 3D ===== */
.slot{
display:flex;
justify-content:center;
gap:10px;
margin:20px 0;
transform-style:preserve-3d;
transform:translateZ(30px);
}

.reel{
width:70px;
height:70px;
background:linear-gradient(145deg,#111,#222);
border:1px solid gold;
border-radius:12px;
font-size:32px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 10px 20px rgba(0,0,0,0.5);
animation:spinReel 1s infinite linear;
}

@keyframes spinReel{
0%{transform:rotateX(0deg)}
100%{transform:rotateX(360deg)}
}

/* ===== BUTTONS ===== */
.btn{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
margin:10px auto;
padding:14px;
width:240px;
border-radius:20px;
color:white;
text-decoration:none;
font-weight:bold;
transform:translateZ(20px);
transition:.3s;
position:relative;
overflow:hidden;
}

.btn img{
width:40px;
}

/* TG */
.tg{
background:linear-gradient(90deg,#229ED9,#1b7fb0);
box-shadow:0 0 25px rgba(34,158,217,0.4);
}

/* VIBER */
.vb{
background:linear-gradient(90deg,#665CAC,#4d44a3);
box-shadow:0 0 25px rgba(102,92,172,0.4);
}

/* HOVER 3D */
.btn:hover{
transform:translateZ(40px) scale(1.05);
}

/* SHINE */
.btn::before{
content:"";
position:absolute;
top:0;
left:-120%;
width:120%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
animation:shine 3s infinite;
}

@keyframes shine{
0%{left:-120%}
100%{left:120%}
}

/* ===== PAY ===== */
.pay{
display:flex;
justify-content:center;
gap:18px;
margin-top:20px;
transform:translateZ(15px);
}

.paybox{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
color:#ffd700;
}

.paybox img{
width:58px;
height:58px;
background:#fff;
padding:6px;
border-radius:14px;
object-fit:contain;
box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

/* ===== 3D COINS ===== */
.coin{
position:fixed;
top:-50px;
font-size:22px;
animation:fall linear forwards;
transform-style:preserve-3d;
opacity:0.9;
}

@keyframes fall{
to{
transform:translateY(120vh) rotateY(720deg);
}
}

</style>
</head>

<body>

<div class="card">

<div class="logo">
<img src="logo.png">
</div>

<h1>Gold 8 VIP 3D</h1>

<div class="status">🟢 Online Service</div>

<!-- SLOT 3D -->
<div class="slot">
<div class="reel">7</div>
<div class="reel">💎</div>
<div class="reel">7</div>
</div>

<!-- BUTTONS -->
<a class="btn tg" href="https://t.me/YOUR_TELEGRAM">
<img src="telegram.png">
Telegram
</a>

<a class="btn vb" href="viber://chat?number=%2B959123456789">
<img src="viber.png">
Viber
</a>

<!-- PAY -->
<div class="pay">

<div class="paybox">
<img src="Kpay.png">
KBZPay
</div>

<div class="paybox">
<img src="WavePay.png">
WavePay
</div>

</div>

</div>

<script>

/* 3D COIN RAIN */
setInterval(()=>{

let c=document.createElement("div")
c.className="coin"
c.innerHTML="💰"
c.style.left=Math.random()*100+"%"
c.style.animationDuration=(3+Math.random()*4)+"s"

document.body.appendChild(c)

setTimeout(()=>c.remove(),8000)

},250)

</script>

</body>
</html>
