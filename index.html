<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Casino Pro</title>

<style>

body{
margin:0;
background:#070707;
color:white;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

/* LOGO */
.logo{
width:120px;
margin-top:20px;
border-radius:20px;
}

/* ===== 3D COIN ===== */

.coin{
width:90px;
height:90px;
margin:20px auto;
position:relative;
transform-style:preserve-3d;
animation:spin 3s linear infinite;
}

.coin-face{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
background:radial-gradient(circle,#ffe08a,#d4af37,#8a6d3b);
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:#000;
}

.coin .front{transform:translateZ(6px)}
.coin .back{transform:rotateY(180deg) translateZ(6px)}

@keyframes spin{
0%{transform:rotateY(0)}
100%{transform:rotateY(360deg)}
}

/* SLOT */

.slot{
display:flex;
justify-content:center;
gap:10px;
margin:20px;
}

.reel{
width:70px;
height:70px;
background:#111;
border:2px solid gold;
border-radius:10px;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
}

/* BUTTON */

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
margin:12px auto;
padding:14px;
width:250px;
border-radius:20px;
color:white;
font-weight:bold;
text-decoration:none;
position:relative;
overflow:hidden;
}

.btn img{width:40px}

.tg{
background:#229ED9;
animation:pulse 1.5s infinite;
}

.vb{
background:#665CAC;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

/* PAYMENT */

.pay{
display:flex;
justify-content:center;
gap:25px;
margin-top:20px;
}

.paybox{
display:flex;
flex-direction:column;
align-items:center;
color:#ffd700;
font-weight:bold;
}

.paybox img{
width:60px;
height:60px;
background:#fff;
padding:6px;
border-radius:14px;
object-fit:contain;
}

/* POPUP */

.popup{
position:fixed;
bottom:20px;
left:20px;
background:#111;
border:1px solid gold;
padding:10px 14px;
border-radius:10px;
display:none;
}

/* COINS */

.coinRain{
position:fixed;
top:-40px;
font-size:22px;
animation:fall linear infinite;
}

@keyframes fall{
100%{transform:translateY(110vh)}
}

</style>
</head>

<body>

<img src="logo.png" class="logo">

<h2>VIP CASINO PRO</h2>

<!-- 3D COIN -->
<div class="coin">
<div class="coin-face front">💰</div>
<div class="coin-face back">💰</div>
</div>

<!-- SLOT -->
<div class="slot">
<div class="reel" id="r1">7</div>
<div class="reel" id="r2">💎</div>
<div class="reel" id="r3">7</div>
</div>

<!-- BUTTONS -->
<a class="btn tg" onclick="openTelegram()">
<img src="telegram.png">
Telegram Support
</a>

<a class="btn vb">
<img src="viber.png">
Viber Support
</a>

<!-- PAY -->
<div class="pay">

<div class="paybox">
<img src="Kpay.png">
KBZPay
</div>

<div class="paybox">
<img src="WavePay.png">
WavePay
</div>

</div>

<div class="popup" id="popup"></div>

<script>

/* TELEGRAM SMART OPEN */
function openTelegram(){

let tg="tg://resolve?domain=yourusername"
let web="https://t.me/yourusername"

window.location=tg

setTimeout(()=>{
window.location=web
},1200)

}

/* SLOT MACHINE LOGIC */
let symbols=["7","💎","🔔","🍒","⭐"]

function spin(){

document.getElementById("r1").innerText=symbols[Math.floor(Math.random()*symbols.length)]
document.getElementById("r2").innerText=symbols[Math.floor(Math.random()*symbols.length)]
document.getElementById("r3").innerText=symbols[Math.floor(Math.random()*symbols.length)]

}

setInterval(spin,100)

/* WIN POPUP */

let names=["Aung","Min","Ko","Zaw","Htet","Moe"]
let money=[50000,80000,120000,200000]

function win(){

let n=names[Math.floor(Math.random()*names.length)]
let m=money[Math.floor(Math.random()*money.length)]

let p=document.getElementById("popup")

p.innerHTML="🎉 "+n+" won "+m+" MMK"
p.style.display="block"

setTimeout(()=>p.style.display="none",4000)

}

setInterval(win,5000)

/* COINS */

for(let i=0;i<20;i++){

let c=document.createElement("div")
c.className="coinRain"
c.innerHTML="💰"
c.style.left=Math.random()*100+"%"
c.style.animationDuration=(3+Math.random()*5)+"s"

document.body.appendChild(c)

}

</script>

</body>
</html>
