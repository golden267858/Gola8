<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Myanmar Gold 8 VIP</title>
    <style>
        :root { 
            --gold-light: #fff3a6;
            --gold-mid: #d4af37;
            --gold-dark: #8a6d3b;
            --gold-shadow: #5c441a;
        }
        
        body { 
            background: #000;
            color: #fff; 
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0;
            overflow: hidden;
        }

        .foreground-coins {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
            perspective: 1200px;
        }

        /* 3D 容器 */
        .coin {
            position: absolute;
            top: -100px;
            width: 50px; height: 50px;
            transform-style: preserve-3d;
            animation: fall-physics linear forwards;
        }

        /* 金币旋转体 */
        .coin-inner {
            position: relative;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            animation: spin 2.5s linear infinite;
        }

        /* 【核心修复】正反两面实体化 */
        .face {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--gold-dark) 0%, var(--gold-light) 25%, var(--gold-mid) 50%, var(--gold-light) 75%, var(--gold-dark) 100%);
            border: 1px solid var(--gold-shadow);
            display: flex; align-items: center; justify-content: center;
            /* 关键：双面可见性 */
            backface-visibility: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        .face::after {
            content: "MMK";
            font-size: 10px; font-weight: 900; color: var(--gold-shadow);
            width: 70%; height: 70%;
            border-radius: 50%;
            border: 2px dashed rgba(138, 109, 59, 0.4);
            display: flex; align-items: center; justify-content: center;
        }

        /* 背面：水平旋转180度 */
        .back {
            transform: rotateY(180deg);
        }

        /* 【核心增加】侧边厚度感 - 通过多个圆圈层叠模拟 3D 边缘 */
        .side {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: var(--gold-dark);
            /* 将侧边放在正反面中间，增加物理厚度 */
            transform: translateZ(-2px);
            border: 1px solid var(--gold-shadow);
        }

        @keyframes spin {
            0% { transform: rotateY(0deg) rotateX(15deg); }
            100% { transform: rotateY(360deg) rotateX(15deg); }
        }

        @keyframes fall-physics {
            0% { transform: translateY(0) scale(0.7); opacity: 0; }
            10% { opacity: 1; }
            95% { transform: translateY(calc(100vh - 40px)) scale(1); }
            100% { transform: translateY(calc(100vh - 50px)) rotateX(75deg); opacity: 1; }
        }

        /* 底部光影 */
        .gold-heap {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 100px;
            background: radial-gradient(ellipse at bottom, rgba(212, 175, 55, 0.4), transparent 75%);
            z-index: 998; filter: blur(15px); pointer-events: none;
        }

        /* 卡片主体 */
        .card { position: relative; width: 92%; max-width: 380px; z-index: 10; }
        .card-inner { 
            position: relative; background: rgba(15, 15, 15, 0.85); 
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 35px; padding: 40px 20px; border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,1);
        }

        .pay-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .pay-box { flex: 1; background: rgba(255,255,255,0.06); padding: 25px 10px; border-radius: 28px; border: 1px solid rgba(212, 175, 55, 0.2); }
        .pay-icon { width: 80px; height: 80px; margin-bottom: 12px; border-radius: 18px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .logo-area { width: 85px; height: 85px; margin: 0 auto 10px; border: 2px solid var(--gold-mid); border-radius: 22px; overflow: hidden; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-size: 22px; color: var(--gold-mid); margin: 10px 0; font-weight: 800; }
        .status { font-size: 13px; color: #44eb87; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 30px; }
        .dot { width: 10px; height: 10px; background: #00c853; border-radius: 50%; box-shadow: 0 0 10px #00c853; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn { text-decoration: none; padding: 18px; border-radius: 20px; font-weight: bold; font-size: 16px; color: white; transition: 0.3s; text-align: center; }
        .btn-tg { background: linear-gradient(135deg, #24A1DE, #1c82b6); }
        .btn-viber { background: linear-gradient(135deg, #7360f2, #5d4ed1); }
        .btn:active { transform: scale(0.96); }
        .notice { margin-top: 25px; font-size: 11px; color: #777; }
    </style>
</head>
<body>
    <div class="foreground-coins" id="coin-canvas"></div>
    <div class="gold-heap"></div>

    <div class="card">
        <div class="card-inner">
            <div class="logo-area">
                <img src="Gold-8-profile-logo-and-Banner.png" alt="Logo" onerror="this.style.background='#222'">
            </div>
            <h1>VIP Gold 8 Service</h1>
            <div class="status"><span class="dot"></span> Online ဝန်ဆောင်မှုရှိနေပါသည်</div>
            
            <div class="pay-row">
                <div class="pay-box">
                    <img src="Kpay.png" class="pay-icon" alt="K" onerror="this.style.background='#0056B3'">
                    <div><strong>KBZPay</strong></div>
                </div>
                <div class="pay-box">
                    <img src="WavePay.png" class="pay-icon" alt="W" onerror="this.style.background='#F6C000'">
                    <div><strong>WavePay</strong></div>
                </div>
            </div>

            <div class="btn-group">
                <a href="https://t.me" class="btn btn-tg">Telegram တွင် ဆက်သွယ်ပါ</a>
                <a href="viber://chat?number=%2B95900000000" class="btn btn-viber">Viber တွင် ဆက်သွယ်ပါ</a>
            </div>
            <div class="notice">မြန်မာနိုင်ငံ၏ စိတ်ချရဆုံးနှင့် အမြန်ဆန်ဆုံး ဝန်ဆောင်မှု</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('coin-canvas');
        function createCoin() {
            const coin = document.createElement('div');
            coin.className = 'coin';
            
            // 构造 3D 实体结构：正面、侧面、反面
            coin.innerHTML = `
                <div class="coin-inner">
                    <div class="side"></div>
                    <div class="face front"></div>
                    <div class="face back"></div>
                </div>
            `;
            
            coin.style.left = Math.random() * 100 + 'vw';
            const duration = Math.random() * 2 + 1.5;
            coin.style.animationDuration = duration + 's';
            
            const scale = Math.random() * 0.4 + 0.8;
            coin.style.transform = `scale(${scale})`;

            canvas.appendChild(coin);

            // 落地后延迟销毁，维持堆积效果
            setTimeout(() => {
                coin.style.transition = 'opacity 3s';
                coin.style.opacity = '0';
                setTimeout(() => coin.remove(), 3000);
            }, duration * 1000 + 12000);
        }

        // 高频生成 (每 50ms 一个，约每秒 20 个)
        setInterval(createCoin, 50);
    </script>
</body>
</html>
