<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Myanmar Gold 8 VIP</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-bright: #f1d572;
            --tg-blue: #24A1DE; 
            --viber-purple: #7360f2; 
        }
        
        body { 
            background: #000;
            color: #fff; 
            font-family: 'Segoe UI', Roboto, 'Pyidaungsu', Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0;
            overflow: hidden;
        }

        /* 前景金币层 */
        .foreground-coins {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999; 
        }

        /* 【核心修改】CSS 绘制的 3D 金币样式 */
        .coin {
            position: absolute;
            top: -60px;
            border-radius: 50%;
            /* 模拟金属拉丝质感 */
            background: radial-gradient(circle at 30% 30%, #fff9e6 0%, #f1d572 40%, #d4af37 70%, #8a6d3b 100%);
            box-shadow: 
                inset 0 0 4px rgba(255,255,255,0.8),
                0 0 10px rgba(212, 175, 55, 0.6);
            border: 1px solid rgba(138, 109, 59, 0.5);
            animation: fall linear forwards;
            will-change: transform;
        }

        /* 给金币添加一个中间的“$”符号或圆形刻印感 */
        .coin::after {
            content: "";
            position: absolute;
            top: 15%; left: 15%; width: 70%; height: 70%;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes fall {
            0% { transform: translateY(0) rotateX(0deg) rotateY(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(calc(100vh + 50px)) rotateX(360deg) rotateY(720deg); opacity: 0.5; }
        }

        /* 底部金光 */
        .gold-heap {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 120px;
            background: linear-gradient(to top, rgba(212, 175, 55, 0.5), transparent);
            z-index: 998;
            filter: blur(25px);
            pointer-events: none;
        }

        /* 卡片主体 */
        .card { 
            position: relative; width: 92%; max-width: 380px; padding: 2px; border-radius: 35px; z-index: 10; 
        }
        .card-inner { 
            position: relative;
            background: rgba(10, 10, 10, 0.85); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border-radius: 33px; padding: 40px 20px; border: 1px solid rgba(212, 175, 55, 0.4);
            text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        /* 极大化支付 Logo (80px) */
        .pay-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .pay-box { 
            flex: 1; background: rgba(255,255,255,0.08); padding: 25px 10px; border-radius: 28px; 
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .pay-icon { 
            width: 80px; height: 80px; margin-bottom: 12px; border-radius: 18px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
        }
        .pay-info strong { color: #fff; font-size: 14px; font-weight: bold; }

        /* 其余样式保持不变 */
        .logo-area { width: 95px; height: 95px; margin: 0 auto 10px; }
        .logo { width: 100%; height: 100%; border-radius: 26px; overflow: hidden; border: 2.5px solid var(--gold); background: #1a1a1a; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-size: 24px; color: var(--gold); margin: 10px 0; font-weight: 900; letter-spacing: 1px; }
        .status { font-size: 14px; color: #44eb87; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 30px; }
        .dot { width: 10px; height: 10px; background: #00c853; border-radius: 50%; box-shadow: 0 0 12px #00c853; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn { text-decoration: none; padding: 20px; border-radius: 22px; font-weight: bold; font-size: 17px; color: white; text-align: center; }
        .btn-tg { background: linear-gradient(135deg, #24A1DE, #1c82b6); box-shadow: 0 5px 20px rgba(36, 161, 222, 0.3); }
        .btn-viber { background: linear-gradient(135deg, var(--viber-purple), #5d4ed1); box-shadow: 0 5px 20px rgba(115, 96, 242, 0.3); }
        .notice { margin-top: 30px; font-size: 12px; color: #999; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="foreground-coins" id="coin-canvas"></div>
    <div class="gold-heap"></div>

    <div class="card">
        <div class="card-inner">
            <div class="logo-area">
                <div class="logo">
                    <img src="Gold-8-profile-logo-and-Banner.png" alt="Logo" onerror="this.style.background='linear-gradient(45deg, #333, #1a1a1a)'">
                </div>
            </div>
            <h1>VIP Gold 8 Service</h1>
            <div class="status"><span class="dot"></span> Online ဝန်ဆောင်မှုရှိနေပါသည်</div>
            <div class="pay-row">
                <div class="pay-box">
                    <img src="Kpay.png" class="pay-icon" alt="KBZPay" onerror="this.style.background='#0056B3'">
                    <div class="pay-info"><strong>KBZPay</strong></div>
                </div>
                <div class="pay-box">
                    <img src="WavePay.png" class="pay-icon" alt="WavePay" onerror="this.style.background='#F6C000'">
                    <div class="pay-info"><strong>WavePay</strong></div>
                </div>
            </div>
            <div class="btn-group">
                <a href="https://t.me" class="btn btn-tg">Telegram တွင် ဆက်သွယ်ပါ</a>
                <a href="viber://chat?number=%2B95900000000" class="btn btn-viber">Viber တွင် ဆက်သွယ်ပါ</a>
            </div>
            <div class="notice">မြန်မာနိုင်ငံ၏ စိတ်ချရဆုံးနှင့် အမြန်ဆန်ဆုံး ဝန်ဆောင်မှု</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('coin-canvas');
        function createCoin() {
            const coin = document.createElement('div');
            coin.className = 'coin';
            
            // 随机大小
            const size = Math.random() * 20 + 20; 
            coin.style.width = size + 'px';
            coin.style.height = size + 'px';
            
            // 随机横向位置
            coin.style.left = Math.random() * 100 + 'vw';
            
            // 随机掉落速度
            const duration = Math.random() * 1.5 + 1.5;
            coin.style.animationDuration = duration + 's';
            
            canvas.appendChild(coin);
            setTimeout(() => { coin.remove(); }, duration * 1000);
        }

        // 高频生成
        setInterval(createCoin, 50);
    </script>
</body>
</html>
