<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Myanmar Gold 8 VIP</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-bright: #f1d572;
            --tg-blue: #24A1DE; 
            --viber-purple: #7360f2; 
        }
        
        body { 
            background: #000;
            color: #fff; 
            font-family: 'Segoe UI', Roboto, 'Pyidaungsu', Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0;
            overflow: hidden; /* 防止金币导致滚动条出现 */
        }

        /* 【前景金币层】z-index 设为最高 999，确保在卡片正前方掉落 */
        .foreground-coins {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* 穿透点击，不影响按钮操作 */
            z-index: 999; 
        }

        .coin {
            position: absolute;
            top: -60px;
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.9));
            animation: fall linear forwards;
            will-change: transform;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateY(calc(100vh + 20px)) rotate(360deg); opacity: 0.6; }
        }

        /* 底部堆积金光感 */
        .gold-heap {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 120px;
            background: linear-gradient(to top, rgba(212, 175, 55, 0.6), transparent);
            z-index: 998;
            filter: blur(25px);
            pointer-events: none;
        }

        /* 玻璃拟态卡片主体 */
        .card { 
            position: relative; 
            width: 92%; 
            max-width: 380px; 
            padding: 2px; 
            border-radius: 35px; 
            z-index: 10; 
        }

        .card-inner { 
            position: relative;
            background: rgba(10, 10, 10, 0.85); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border-radius: 33px; 
            padding: 40px 20px; 
            border: 1px solid rgba(212, 175, 55, 0.4);
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        /* 顶部 Logo 区 */
        .logo-area { width: 95px; height: 95px; margin: 0 auto 10px; }
        .logo { 
            width: 100%; height: 100%; border-radius: 26px; overflow: hidden; 
            border: 2.5px solid var(--gold);
            background: #1a1a1a;
        }
        .logo img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 24px; color: var(--gold); margin: 10px 0; font-weight: 900; letter-spacing: 1px; }
        
        /* 在线状态指示器 */
        .status { 
            font-size: 14px; color: #44eb87; 
            display: flex; align-items: center; justify-content: center; 
            gap: 8px; margin-bottom: 30px; 
        }
        .dot { 
            width: 10px; height: 10px; background: #00c853; border-radius: 50%; 
            box-shadow: 0 0 12px #00c853; animation: blink 1.5s infinite; 
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 【核心修改】极大化支付 Logo (80px) */
        .pay-row { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 40px; 
        }
        .pay-box { 
            flex: 1;
            background: rgba(255,255,255,0.08); 
            padding: 25px 10px; 
            border-radius: 28px; 
            border: 1px solid rgba(212, 175, 55, 0.3);
            transition: 0.3s;
        }
        .pay-icon { 
            width: 80px; 
            height: 80px; 
            margin-bottom: 12px; 
            border-radius: 18px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .pay-info strong { color: #fff; font-size: 14px; font-weight: bold; }

        /* 按钮组 */
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn { 
            text-decoration: none; padding: 20px; border-radius: 22px; 
            font-weight: bold; font-size: 17px; transition: 0.3s;
            color: white; text-align: center;
        }
        .btn-tg { 
            background: linear-gradient(135deg, #24A1DE, #1c82b6); 
            box-shadow: 0 5px 20px rgba(36, 161, 222, 0.3); 
        }
        .btn-viber { 
            background: linear-gradient(135deg, var(--viber-purple), #5d4ed1); 
            box-shadow: 0 5px 20px rgba(115, 96, 242, 0.3); 
        }
        .btn:active { transform: scale(0.94); }

        .notice { margin-top: 30px; font-size: 12px; color: #999; line-height: 1.6; }
    </style>
</head>
<body>
    <!-- 前景金币瀑布层 -->
    <div class="foreground-coins" id="coin-canvas"></div>
    <!-- 底部环境光层 -->
    <div class="gold-heap"></div>

    <div class="card">
        <div class="card-inner">
            <div class="logo-area">
                <div class="logo">
                    <!-- 请替换为您自己的 Logo 图片链接 -->
                    <img src="Gold-8-profile-logo-and-Banner.png" alt="Logo" onerror="this.style.background='linear-gradient(45deg, #333, #1a1a1a)'">
                </div>
            </div>
            
            <h1>VIP Gold 8 Service</h1>
            <div class="status"><span class="dot"></span> Online ဝန်ဆောင်မှုရှိနေပါသည်</div>

            <!-- 极大化支付入口 (80px) -->
            <div class="pay-row">
                <div class="pay-box">
                    <img src="Kpay.png" class="pay-icon" alt="KBZPay" onerror="this.style.background='#0056B3'">
                    <div class="pay-info"><strong>KBZPay</strong></div>
                </div>
                <div class="pay-box">
                    <img src="WavePay.png" class="pay-icon" alt="WavePay" onerror="this.style.background='#F6C000'">
                    <div class="pay-info"><strong>WavePay</strong></div>
                </div>
            </div>

            <div class="btn-group">
                <!-- 请替换为您真实的 Telegram ID -->
                <a href="https://t.me" class="btn btn-tg">
                    Telegram တွင် ဆက်သွယ်ပါ
                </a>
                <!-- 请替换为您真实的 Viber 号码 -->
                <a href="viber://chat?number=%2B95900000000" class="btn btn-viber">
                    Viber တွင် ဆက်သွယ်ပါ
                </a>
            </div>

            <div class="notice">
                မြန်မာနိုင်ငံ၏ စိတ်ချရဆုံးနှင့် အမြန်ဆန်ဆုံး ဝန်ဆောင်မှု<br>
                (၂၄) နာရီ စိတ်ကြိုက်မေးမြန်းနိုင်ပါသည်
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('coin-canvas');
        
        function createCoin() {
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.innerText = '🪙';
            
            // 随机横向位置 (0-100vw)
            coin.style.left = Math.random() * 100 + 'vw';
            
            // 随机大小 (20px 到 45px 之间)，增加层次感
            const size = Math.random() * 25 + 20; 
            coin.style.fontSize = size + 'px';
            
            // 随机掉落速度 (1.2s 到 3s 之间)
            const duration = Math.random() * 1.8 + 1.2;
            coin.style.animationDuration = duration + 's';
            
            // 随机旋转角度起始值
            coin.style.transform = `rotate(${Math.random() * 360}deg)`;
            
            canvas.appendChild(coin);

            // 动画结束后准时移除元素，释放内存
            setTimeout(() => {
                coin.remove();
            }, duration * 1000);
        }

        // 【3倍密度核心设置】每 50 毫秒生成一枚金币
        setInterval(createCoin, 50);

        // 初始化时先刷出一批金币，避免页面开启时太突兀
        for(let i=0; i<10; i++) {
            setTimeout(createCoin, i * 100);
        }
    </script>
</body>
</html>
