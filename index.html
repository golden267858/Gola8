<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Myanmar Gold 8 VIP - Club388 & Batman688 Agent</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-light: #f9edbe; 
            --gold-bright: #fff9e6;
            --tg-blue: #24A1DE; 
            --viber-purple: #7360f2;
        }
        
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow: hidden;
        }

        /* 3D 前景金币 */
        .foreground-coins {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999; perspective: 1000px;
        }
        .coin {
            position: absolute; top: -60px; width: 34px; height: 34px;
            transform-style: preserve-3d; animation: fall-slow linear forwards;
        }
        .coin-inner {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d; animation: rotate3d 3.5s linear infinite;
        }
        .face {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(from 0deg, var(--gold) 0%, var(--gold-bright) 25%, var(--gold-light) 50%, var(--gold-bright) 75%, var(--gold) 100%);
            border: 1.1px solid var(--gold-bright); display: flex; align-items: center; justify-content: center;
        }
        .face::after { content: "MMK"; font-size: 11px; font-weight: 900; color: #7d5e00; }
        .front { transform: translateZ(2px); }
        .back  { transform: translateZ(-2px) rotateY(180deg); }
        .side { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: var(--gold); transform: translateZ(0); }

        @keyframes rotate3d { 0% { transform: rotateY(0deg) rotateX(15deg); } 100% { transform: rotateY(360deg) rotateX(15deg); } }
        @keyframes fall-slow { 0% { transform: translateY(0); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(110vh); opacity: 1; } }

        /* 发光卡片容器 */
        .card { 
            position: relative; background: rgba(20, 20, 20, 0.95); width: 90%; max-width: 380px; 
            padding: 4px; border-radius: 35px; text-align: center; overflow: hidden;
            backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.25); z-index: 10;
        }
        .card::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--gold));
            animation: rotate-border 4s linear infinite; z-index: -1;
        }
        @keyframes rotate-border { 100% { transform: rotate(360deg); } }
        .card-inner { background: #121212; border-radius: 32px; padding: 25px 18px; }

        /* Logo 呼吸效果 - 增大至120px */
        .logo-area { 
            position: relative; width: 120px; height: 120px; margin: 0 auto 12px; 
            animation: breathe 3s ease-in-out infinite; 
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4)); }
            50% { transform: scale(1.04); filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.7)); }
        }
        .logo { width: 100%; height: 100%; border-radius: 25px; overflow: hidden; border: 2.5px solid var(--gold); background: #1a1a1a; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        .verified-badge { position: absolute; bottom: 0; right: 0; background: #00c853; color: white; font-size: 10px; padding: 3px 8px; border-radius: 10px; border: 2px solid #121212; }

        h1 { font-size: 22px; color: var(--gold); margin: 5px 0; font-weight: 800; }
        .status { font-size: 12px; color: #44eb87; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 18px; }
        .dot { width: 8px; height: 8px; background: #00c853; border-radius: 50%; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 游戏展示 */
        .game-section { margin-bottom: 20px; }
        .game-label { font-size: 9px; color: var(--gold-light); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; display: block; opacity: 0.7; }
        .game-row { display: flex; justify-content: center; gap: 15px; }
        .game-box { 
            width: 85px; height: 85px; background: #000; 
            border-radius: 20px; border: 1.5px solid rgba(212, 175, 55, 0.4);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        /* 针对 Club388 和 Batman 的差异化填充 */
        .game-box .club { padding: 5px; object-fit: contain; }
        .game-box .batman { object-fit: cover; }
        .game-box img { width: 100%; height: 100%; }

        /* 支付图标 */
        .pay-row { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
        .pay-box { flex: 1; display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.03); padding: 12px 5px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); }
        .pay-icon-wrapper { width: 60px; height: 60px; border-radius: 14px; overflow: hidden; margin-bottom: 6px; background: #fff; }
        .pay-icon-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .pay-info strong { color: #fff; font-size: 12px; }

        /* 按钮组 */
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn { display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; padding: 14px; border-radius: 22px; color: white; transition: 0.3s; }
        .btn-main { font-weight: bold; font-size: 16px; }
        .btn-sub { font-size: 11px; opacity: 0.9; font-weight: normal; margin-top: 2px; }
        
        .btn-tg { background: linear-gradient(90deg, #24A1DE, #1c82b6); box-shadow: 0 8px 20px rgba(36, 161, 222, 0.3); }
        .btn-viber { background: linear-gradient(90deg, #7360f2, #5d4ed1); box-shadow: 0 8px 20px rgba(115, 96, 242, 0.3); }
        .btn:active { transform: scale(0.96); }

        .notice { margin-top: 20px; font-size: 11px; color: #777; line-height: 1.6; }
        .highlight { color: var(--gold-light); font-weight: bold; }
    </style>
</head>
<body>
    <div class="foreground-coins" id="coin-canvas"></div>

    <div class="card">
        <div class="card-inner">
            <div class="logo-area">
                <div class="logo">
                    <img src="Gold-8-profile-logo-and-Banner.png" alt="Gold 8 Logo" onerror="this.style.background='#333'">
                </div>
                <div class="verified-badge">Verified Agent</div>
            </div>

            <h1>Gold 8 VIP Service</h1>
            <div class="status"><span class="dot"></span> Online - အခုဆက်သွယ်နိုင်ပါသည်</div>

            <!-- 游戏展示区 -->
            <div class="game-section">
                <span class="game-label">Official Partner Games</span>
                <div class="game-row">
                    <div class="game-box">
                        <img src="club388.png" class="club" alt="Club388" onerror="this.style.background='#222'">
                    </div>
                    <div class="game-box">
                        <img src="batman688.png" class="batman" alt="Batman688" onerror="this.style.background='#222'">
                    </div>
                </div>
            </div>

            <!-- 支付区 -->
            <div class="pay-row">
                <div class="pay-box">
                    <div class="pay-icon-wrapper"><img src="Kpay.png" alt="KPay" onerror="this.style.background='#0056B3'"></div>
                    <div class="pay-info"><strong>KBZPay</strong></div>
                </div>
                <div class="pay-box">
                    <div class="pay-icon-wrapper"><img src="WavePay.png" alt="WavePay" onerror="this.style.background='#F6C000'"></div>
                    <div class="pay-info"><strong>WavePay</strong></div>
                </div>
            </div>

            <!-- 按钮组 -->
            <div class="btn-group">
                <a href="https://t.me" class="btn btn-tg">
                    <span class="btn-main">Telegram တွင် ဆက်သွယ်ပါ</span>
                    <span class="btn-sub">ဂိမ်းယူနစ်ဝယ်ယူရန်</span>
                </a>
                <a href="viber://chat?number=%2B95900000000" class="btn btn-viber">
                    <span class="btn-main">Viber တွင် ဆက်သွယ်ပါ</span>
                    <span class="btn-sub">ဂိမ်းယူနစ်ဝယ်ယူရန်</span>
                </a>
            </div>

            <div class="notice">
                <span class="highlight">Club388 & Batman688</span> တိုက်ရိုက်အေးဂျင့်<br>
                ယူနစ်သွင်း/ထုတ် မြန်ဆန်စိတ်ချရပါသည်
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('coin-canvas');
        function createCoin() {
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.innerHTML = `<div class="coin-inner"><div class="side"></div><div class="front face"></div><div class="back face"></div></div>`;
            coin.style.left = Math.random() * 100 + 'vw';
            const duration = Math.random() * 3 + 5;
            coin.style.animationDuration = duration + 's';
            canvas.appendChild(coin);
            setTimeout(() => { coin.remove(); }, duration * 1000);
        }
        setInterval(createCoin, 450);
    </script>
</body>
</html>
