<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Gold 8 VIP</title>
    <style>
        :root { --gold: #d4af37; --gold-light: #f9edbe; --tg-blue: #24A1DE; }
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        
        .card { 
            position: relative; background: rgba(25, 25, 25, 0.9); width: 85%; max-width: 380px; 
            padding: 4px; border-radius: 28px; text-align: center; overflow: hidden;
            backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .card::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--gold));
            animation: rotate 4s linear infinite; z-index: -1;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .card-inner { background: #121212; border-radius: 24px; padding: 35px 20px; }

        .logo-area { position: relative; width: 100px; height: 100px; margin: 0 auto 20px; }
        .logo { 
            width: 100%; height: 100%; border-radius: 25px; overflow: hidden;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); border: 2.5px solid var(--gold);
        }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        .verified-badge { 
            position: absolute; bottom: -5px; right: -5px; background: #00c853; 
            color: white; font-size: 10px; padding: 4px 8px; border-radius: 10px; border: 2px solid #121212;
        }

        h1 { font-size: 24px; color: var(--gold); margin: 10px 0 5px; letter-spacing: 1px; }
        .status { font-size: 12px; color: #00c853; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 30px; }
        .dot { width: 8px; height: 8px; background: #00c853; border-radius: 50%; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 支付布局 */
        .pay-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 35px; }
        .pay-box { 
            display: flex; align-items: center; background: rgba(255,255,255,0.05); 
            padding: 12px 18px; border-radius: 16px; border: 1px solid rgba(212, 175, 55, 0.2);
            text-align: left; transition: 0.3s;
        }
        .pay-icon { width: 38px; height: 38px; border-radius: 10px; margin-right: 15px; }
        .pay-info span { font-size: 11px; color: #888; display: block; }
        .pay-info strong { color: #fff; font-size: 16px; }
        .pay-box:hover { background: rgba(212, 175, 55, 0.08); border-color: var(--gold); }

        .btn-tg { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: linear-gradient(90deg, #24A1DE, #1c82b6); color: white; 
            text-decoration: none; padding: 18px; border-radius: 20px; font-weight: bold; 
            font-size: 18px; transition: 0.3s; box-shadow: 0 10px 25px rgba(36, 161, 222, 0.3);
        }
        .btn-tg:active { transform: scale(0.96); }
        .notice { margin-top: 25px; font-size: 11px; color: #555; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-inner">
            <!-- 你的 Logo 图片 -->
            <div class="logo-area">
                <div class="logo">
                    <img src="Gold-8-profile-logo-and-Banner.png" style="width:100%; height:100%; border-radius:25px; object-fit:cover;">
                </div>
                <div class="verified-badge">Verified</div>
            </div>
            
            <h1>VIP Gold 8 Service</h1>
            <div class="status"><span class="dot"></span> Online ဝန်ဆောင်မှုရှိနေပါသည်</div>

            <!-- 支付方式：KPay & WavePay -->
            <div class="pay-grid">
                <!-- KBZPay -->
                <div class="pay-box">
                    <img src="Kpay.png" class="pay-icon" alt="KPay" onerror="this.src='https://gstatic.com'">
                    <div class="pay-info">
                        <span>ငွေသွင်း/ငွေထုတ်</span>
                        <strong>KBZPay</strong>
                    </div>
                </div>
                <!-- WavePay -->
                <div class="pay-box">
                    <img src="WavePay.png" class="pay-icon" alt="WavePay" onerror="this.src='https://gstatic.com'">
                    <div class="pay-info">
                        <span>ငွေသွင်း/ငွေထုတ်</span>
                        <strong>WavePay</strong>
                    </div>
                </div>
            </div>

            <!-- 按钮 -->
            <a href="https://t.me" class="btn-tg">
                Telegram တွင် ဆက်သွယ်ပါ
            </a>

            <div class="notice">
                မြန်မာနိုင်ငံ၏ စိတ်ချရဆုံးနှင့် အမြန်ဆန်ဆုံး ဝန်ဆောင်မှု<br>
                (၂၄) နာရီ စိတ်ကြိုက်မေးမြန်းနိုင်ပါသည်
            </div>
        </div>
    </div>
</body>
</html>
