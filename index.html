<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold 8 VIP - Myanmar Official Agent</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-bright: #fff9e6;
            --card-bg: rgba(18, 18, 18, 0.98);
            --btn-bg: rgba(40, 40, 40, 0.6);
        }
        
        body { 
            background: #000; 
            color: #fff; font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow: hidden;
        }

        /* 背景金币动画 */
        .bg-coins { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .coin { position: absolute; width: 30px; height: 30px; background: radial-gradient(circle, var(--gold-bright), var(--gold)); border-radius: 50%; box-shadow: 0 0 10px rgba(212,175,55,0.5); animation: fall linear infinite; opacity: 0.8; }
        .coin::after { content: "MMK"; font-size: 8px; color: #5c441a; display: flex; align-items: center; justify-content: center; height: 100%; font-weight: bold; }
        @keyframes fall { from { transform: translateY(-50px) rotateX(0); } to { transform: translateY(110vh) rotateX(720deg); } }

        /* 主卡片容器 */
        .card { 
            position: relative; background: var(--card-bg); width: 90%; max-width: 360px; 
            padding: 30px 20px; border-radius: 25px; text-align: center; z-index: 10;
            border: 2px solid var(--gold); box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        /* 头部 Logo 区域 */
        .header { margin-bottom: 20px; }
        .vip-badge { width: 70px; height: 70px; margin: 0 auto; border: 2px solid var(--gold); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        .vip-badge .num { font-size: 24px; font-weight: 900; color: var(--gold); line-height: 1; }
        .vip-badge .txt { font-size: 10px; color: var(--gold); font-weight: bold; }
        
        .verified-agent { background: #24A1DE; color: white; font-size: 12px; padding: 4px 12px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; }
        
        h1 { font-size: 24px; color: var(--gold); margin: 15px 0 5px; }
        .status { color: #44eb87; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .dot { width: 10px; height: 10px; background: #00c853; border-radius: 50%; box-shadow: 0 0 8px #00c853; }

        /* 游戏与支付网格 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .item { 
            background: var(--btn-bg); border: 1px solid rgba(212, 175, 55, 0.4); 
            border-radius: 12px; padding: 10px; display: flex; align-items: center; gap: 10px; 
            text-decoration: none; color: white; font-size: 14px; font-weight: bold;
        }
        .item img { width: 30px; height: 30px; border-radius: 6px; object-fit: cover; }

        /* 支付 Logo 特殊处理 */
        .pay-item { justify-content: center; height: 45px; font-size: 16px; border-color: rgba(255,255,255,0.2); }
        .kpay-logo { background: #0067b1; color: white; padding: 2px 5px; border-radius: 4px; font-size: 10px; }
        .wave-logo { background: #f6d000; color: #d80027; padding: 2px 5px; border-radius: 4px; font-size: 10px; font-weight: 900; }

        /* 联系按钮 */
        .contact-btn { 
            display: flex; align-items: center; gap: 15px; padding: 12px 20px; border-radius: 15px; 
            margin-bottom: 12px; text-decoration: none; color: white; text-align: left;
            transition: transform 0.2s;
        }
        .contact-btn:active { transform: scale(0.96); }
        .contact-btn i { font-size: 35px; }
        .btn-info { display: flex; flex-direction: column; }
        .btn-info .main { font-size: 18px; font-weight: bold; }
        .btn-info .sub { font-size: 11px; opacity: 0.9; }

        .tg { background: #24A1DE; box-shadow: 0 4px 15px rgba(36, 161, 222, 0.4); }
        .viber { background: #7360f2; box-shadow: 0 4px 15px rgba(115, 96, 242, 0.4); }

        .footer-note { font-size: 11px; color: #888; line-height: 1.5; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="bg-coins" id="coin-box"></div>

    <div class="card">
        <div class="header">
            <div class="vip-badge">
                <span class="num">8</span>
                <span class="txt">VIP</span>
            </div>
            <div class="verified-agent">
                <i class="fa-solid fa-circle-check"></i> Verified Agent
            </div>
            <h1>Gold 8 VIP Service</h1>
            <div class="status"><span class="dot"></span> Online အပ်တံယူမည်</div>
        </div>

        <!-- 游戏品牌 -->
        <div class="grid">
            <div class="item">
                <img src="https://icons8.com" alt="Club388">
                <span>Club388</span>
            </div>
            <div class="item">
                <img src="https://icons8.com" alt="Batman688">
                <span>Batman688</span>
            </div>
        </div>

        <!-- 支付方式 -->
        <div class="grid">
            <div class="item pay-item">
                <span class="kpay-logo">KBZ</span>
                <span>KBZPay</span>
            </div>
            <div class="item pay-item">
                <span class="wave-logo">Wave</span>
                <span>WavePay</span>
            </div>
        </div>

        <!-- 联系方式 -->
        <a href="#" class="contact-btn tg">
            <i class="fa-brands fa-telegram"></i>
            <div class="btn-info">
                <span class="main">Telegram တွင် ဆက်သွယ်ပါ</span>
                <span class="sub">ဂိမ်းယူရန်စုံစမ်းယူရန်</span>
            </div>
        </a>

        <a href="#" class="contact-btn viber">
            <i class="fa-brands fa-viber"></i>
            <div class="btn-info">
                <span class="main">Viber တွင် ဆက်သွယ်ပါ</span>
                <span class="sub">ဂိမ်းယူရန်စုံစမ်းယူရန်</span>
            </div>
        </a>

        <div class="footer-note">
            'Club388® & Batman688® အေဂျင်စီ<br>
            ရေရှည်ရန် ဂိမ်းယူရန်စုံစမ်းယူရန်။
        </div>
    </div>

    <script>
        function createCoins() {
            const box = document.getElementById('coin-box');
            for(let i=0; i<15; i++) {
                let coin = document.createElement('div');
                coin.className = 'coin';
                coin.style.left = Math.random() * 100 + 'vw';
                coin.style.animationDuration = (Math.random() * 3 + 2) + 's';
                coin.style.animationDelay = Math.random() * 5 + 's';
                box.appendChild(coin);
            }
        }
        createCoins();
    </script>
</body>
</html>
