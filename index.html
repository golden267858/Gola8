<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Gold 8 VIP</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-bright: #f1d572;
            --tg-blue: #24A1DE; 
            --viber-purple: #7360f2; 
        }
        
        body { 
            background: #000;
            color: #fff; 
            font-family: 'Segoe UI', Roboto, 'Pyidaungsu', Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0;
            overflow: hidden;
        }

        /* 外部容器 - 降低 z-index 让金币在前方 */
        .card { 
            position: relative; 
            width: 90%; 
            max-width: 360px; 
            padding: 2px; 
            border-radius: 35px; 
            z-index: 5; /* 低于金币的 z-index */
        }

        /* 前景金币容器 */
        .foreground-coins {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100; /* 确保在最前面 */
        }

        .coin {
            position: absolute;
            top: -50px;
            font-size: 24px;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.8));
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(calc(100vh - 30px)) rotate(360deg); opacity: 0.8; }
        }

        /* 底部堆积感渐变 */
        .bottom-pile {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 80px;
            background: linear-gradient(to top, rgba(212, 175, 55, 0.4), transparent);
            pointer-events: none;
            z-index: 99;
            filter: blur(10px);
        }

        /* 内部透明卡片 */
        .card-inner { 
            position: relative;
            background: rgba(15, 15, 15, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-radius: 33px; 
            padding: 40px 20px; 
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        .logo-area { width: 90px; height: 90px; margin: 0 auto 15px; }
        .logo { 
            width: 100%; height: 100%; border-radius: 24px; overflow: hidden;
            border: 2px solid var(--gold);
        }
        .logo img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 22px; color: var(--gold); margin: 10px 0; font-weight: 800; }
        
        .status { font-size: 13px; color: #44eb87; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 30px; }
        .dot { width: 8px; height: 8px; background: #00c853; border-radius: 50%; box-shadow: 0 0 10px #00c853; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 支付 Logo 放大布局 */
        .pay-row { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 35px; 
        }
        .pay-box { 
            flex: 1;
            background: rgba(255,255,255,0.08); 
            padding: 20px 10px; 
            border-radius: 25px; 
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        /* 增大 Logo 尺寸 */
        .pay-icon { 
            width: 56px; 
            height: 56px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .pay-info strong { color: #fff; font-size: 13px; letter-spacing: 0.5px; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn { 
            text-decoration: none; padding: 18px; border-radius: 20px; 
            font-weight: bold; font-size: 16px; transition: 0.3s;
            color: white;
        }
        .btn-tg { background: linear-gradient(135deg, #24A1DE, #1c82b6); }
        .btn-viber { background: linear-gradient(135deg, var(--viber-purple), #5d4ed1); }
        .btn:active { transform: scale(0.95); }

        .notice { margin-top: 25px; font-size: 11px; color: #888; }
    </style>
</head>
<body>
    <!-- 前景金币 -->
    <div class="foreground-coins" id="coin-canvas"></div>
    <!-- 底部堆积感 -->
    <div class="bottom-pile"></div>

    <div class="card">
        <div class="card-inner">
            <div class="logo-area">
                <div class="logo">
                    <img src="Gold-8-profile-logo-and-Banner.png" alt="Logo" onerror="this.style.background='#222'">
                </div>
            </div>
            
            <h1>VIP Gold 8 Service</h1>
            <div class="status"><span class="dot"></span> Online ဝန်ဆောင်မှုရှိနေပါသည်</div>

            <div class="pay-row">
                <div class="pay-box">
                    <img src="Kpay.png" class="pay-icon" alt="K" onerror="this.style.background='#0056B3'">
                    <div class="pay-info"><strong>KBZPay</strong></div>
                </div>
                <div class="pay-box">
                    <img src="WavePay.png" class="pay-icon" alt="W" onerror="this.style.background='#F6C000'">
                    <div class="pay-info"><strong>WavePay</strong></div>
                </div>
            </div>

            <div class="btn-group">
                <a href="https://t.me" class="btn btn-tg">Telegram တွင် ဆက်သွယ်ပါ</a>
                <a href="viber://chat?number=%2B95900000000" class="btn btn-viber">Viber တွင် ဆက်သွယ်ပါ</a>
            </div>

            <div class="notice">
                မြန်မာနိုင်ငံ၏ စိတ်ချရဆုံးနှင့် အမြန်ဆန်ဆုံး ဝန်ဆောင်မှု
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('coin-canvas');
        
        function createCoin() {
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.innerText = '🪙';
            // 随机位置
            coin.style.left = Math.random() * 100 + 'vw';
            // 随机大小，增加层次感
            const size = Math.random() * 10 + 20; 
            coin.style.fontSize = size + 'px';
            // 随机掉落速度
            const duration = Math.random() * 2 + 3;
            coin.style.animationDuration = duration + 's';
            
            canvas.appendChild(coin);

            // 动画结束后停留一小会儿再移除，或者模拟堆积消失
            setTimeout(() => {
                coin.style.opacity = '0';
                coin.style.transition = 'opacity 1s';
                setTimeout(() => coin.remove(), 1000);
            }, duration * 1000 - 500);
        }

        // 高频率产生金币，增加数量感
        setInterval(createCoin, 200);
    </script>
</body>
</html>
