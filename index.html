<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIP Casino</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
overflow-x:hidden;
}

/* LOGO */

.logo{
width:120px;
margin-top:20px;
}

/* 3D COIN */

.coin{
width:90px;
height:90px;
margin:20px auto;
position:relative;
transform-style:preserve-3d;
animation:spin 4s linear infinite;
}

.coin div{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
background:linear-gradient(45deg,#ffd700,#ffb400);
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:26px;
color:#000;
}

.coin .back{
transform:rotateY(180deg);
}

@keyframes spin{
0%{transform:rotateY(0)}
100%{transform:rotateY(360deg)}
}

/* SLOT MACHINE */

.slot{
margin:20px auto;
display:flex;
justify-content:center;
gap:10px;
}

.reel{
width:70px;
height:70px;
background:#111;
border:2px solid gold;
border-radius:10px;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
animation:spinReel 1s infinite;
}

@keyframes spinReel{
0%{transform:translateY(-10px)}
50%{transform:translateY(10px)}
100%{transform:translateY(-10px)}
}

/* BUTTONS */

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
margin:12px auto;
padding:14px;
width:240px;
border-radius:20px;
font-weight:bold;
text-decoration:none;
color:white;
position:relative;
overflow:hidden;
}

.btn img{
width:40px;
}

.telegram{
background:#229ED9;
}

.viber{
background:#665CAC;
}

/* BUTTON SHINE */

.btn:before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
animation:shine 3s infinite;
}

@keyframes shine{
0%{left:-100%}
50%{left:100%}
100%{left:100%}
}

/* PAYMENT */

.pay{
display:flex;
justify-content:center;
gap:30px;
margin-top:20px;
}

.paybox{
display:flex;
flex-direction:column;
align-items:center;
color:#ffd700;
font-weight:bold;
}

.paybox img{
width:60px;
height:60px;
background:#fff;
padding:6px;
border-radius:14px;
object-fit:contain;
}

/* COIN RAIN */

.coinRain{
position:fixed;
top:-50px;
font-size:24px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px)}
100%{transform:translateY(110vh)}
}

/* WIN POPUP */

.popup{
position:fixed;
bottom:20px;
left:20px;
background:#111;
border:1px solid gold;
padding:10px 16px;
border-radius:10px;
font-size:14px;
display:none;
}

</style>
</head>

<body>

<img src="logo.png" class="logo">

<h2>VIP CASINO</h2>

<div class="coin">
<div>💰</div>
<div class="back">💰</div>
</div>

<!-- SLOT -->

<div class="slot">
<div class="reel">7</div>
<div class="reel">💎</div>
<div class="reel">7</div>
</div>

<!-- BUTTONS -->

<a class="btn telegram" onclick="openTelegram()">
<img src="telegram.png">
Telegram Support
</a>

<a class="btn viber" href="#">
<img src="viber.png">
Viber Support
</a>

<!-- PAYMENTS -->

<div class="pay">

<div class="paybox">
<img src="Kpay.png">
KBZPay
</div>

<div class="paybox">
<img src="WavePay.png">
WavePay
</div>

</div>

<div class="popup" id="winPopup"></div>

<script>

/* TELEGRAM DETECT */

function openTelegram(){

let tg="tg://resolve?domain=yourusername"

let web="https://t.me/yourusername"

window.location=tg

setTimeout(function(){
window.location=web
},1500)

}

/* COIN RAIN */

for(let i=0;i<15;i++){

let coin=document.createElement("div")
coin.className="coinRain"
coin.innerHTML="🪙"
coin.style.left=Math.random()*100+"%"
coin.style.animationDuration=(3+Math.random()*4)+"s"

document.body.appendChild(coin)

}

/* WIN POPUP */

let names=["Aung","Min","Ko","Su","Zaw","Moe","Htet"]
let money=[50000,120000,80000,150000,90000]

function showWin(){

let name=names[Math.floor(Math.random()*names.length)]
let amount=money[Math.floor(Math.random()*money.length)]

let popup=document.getElementById("winPopup")

popup.innerHTML=name+" won "+amount+" MMK 🎉"

popup.style.display="block"

setTimeout(()=>{
popup.style.display="none"
},4000)

}

setInterval(showWin,5000)

</script>

</body>
</html>
