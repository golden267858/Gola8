<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目就绪 - 最终版</title>
    <!-- 引入 Font Awesome 用于矢量小图标 -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-dark: #aa8a2e;
            --black-bg: #0d0d0d;
        }

        body {
            background-color: var(--black-bg);
            color: #fff;
            font-family: 'PingFang SC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: linear-gradient(145deg, #1a1a1a, #050505);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            text-align: center;
            max-width: 400px;
        }

        /* 本地上传图标的展示容器 */
        .local-icon-box {
            margin-bottom: 1.5rem;
        }

        .local-icon-box img {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            border: 2px solid var(--gold-primary);
        }

        h2 { color: var(--gold-primary); margin: 0 0 10px; font-weight: 500; }
        p { color: #888; font-size: 14px; line-height: 1.6; }

        /* 黑金风格下载按钮 */
        .btn-download {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(to bottom, var(--gold-primary), var(--gold-dark));
            color: #000;
            padding: 12px 35px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 25px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
            filter: brightness(1.1);
        }

        .btn-download i {
            margin-right: 10px;
            font-size: 1.2rem;
        }

        /* 底部矢量图标组 */
        .footer-icons {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            color: #444;
        }

        .footer-icons i:hover {
            color: var(--gold-primary);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- 这里引用你上传的本地图标 -->
        <div class="local-icon-box">
            <img src="kpay.png" alt="Logo">
        </div>

        <h2>项目已就绪</h2>
        <p>这是一个整合了矢量图标与本地资源的最终版。您可以根据需要通过类名或路径更换资源。</p>

        <!-- 下载按钮：整合了 FontAwesome 矢量图标 -->
        <a href="your-file-path.zip" class="btn-download" download>
            <i class="fas fa-cloud-arrow-down"></i> 立即下载
        </a>

        <!-- 装饰性矢量图标 -->
        <div class="footer-icons">
            <i class="fab fa-github"></i>
            <i class="fas fa-shield-halved"></i>
            <i class="fas fa-circle-check"></i>
        </div>
    </div>

</body>
</html>
